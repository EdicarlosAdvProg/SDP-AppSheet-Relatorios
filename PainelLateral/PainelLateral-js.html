<script>
  // ================================================================
  // ESTADO GLOBAL DO PAINEL LATERAL
  // Centraliza todos os dados em memória para evitar chamadas
  // desnecessárias ao servidor.
  // ================================================================
  var PL_estado = {
    sessaoAtualId:       null,
    pautasCarregadas:    {},   // Cache por sessaoId
    membros:             [],
    procuradores:        [],
    cacheMembros:        [],   // Lista completa para autocomplete
    cacheProcuradores:   [],   // Lista completa para autocomplete
    presidente: "",
    secretario: ""
  };

  // ================================================================
  // PONTO DE ENTRADA ÚNICO
  // Chamado no final do layout.
  // ================================================================
  function PL_JS_inicializarComDadosIniciais() {
    var inicial = window.DADOS_INICIAIS;
    if (!inicial) {
      PL_JS_mostrarErro('Falha ao receber dados iniciais.');
      return;
    }

    // 1. Popula caches de autocomplete (Dados Estáticos)
    PL_estado.cacheMembros      = inicial.cadastros.membros      || [];
    PL_estado.cacheProcuradores = inicial.cadastros.procuradores || [];
    
    // Configura o motor de busca do Materialize
    PL_JS_configurarAutocompletes();

    // 2. Monta o dropdown de sessões
    PL_JS_popularDropdown(inicial.sessoes);

    // 3. GATILHO DE CARREGAMENTO DINÂMICO
    // Em vez de usar dados injetados, pedimos ao servidor a versão mais nova da 1ª sessão
    if (inicial.sessoes && inicial.sessoes.length > 0) {
      PL_JS_selecionarSessao(inicial.sessoes[0].id);
    } else {
      PL_JS_mostrarLoading(false);
      PL_JS_mostrarErro('Nenhuma sessão disponível.');
    }
  }

  /** * Função acionada pelo botão de atualizar ao lado do label PAUTA.
   * Recarrega os dados da sessão que já está selecionada no estado global.
   */
  function PL_JS_recarregarSessaoAtual() {
    if (PL_estado.sessaoAtualId) {
      // Exibe um toast para dar feedback ao usuário
      M.toast({html: 'Atualizando dados...', displayLength: 1000});
      
      // Chama a função que já temos que vai ao servidor buscar os dados novos
      PL_JS_carregarPautaNoServidor(PL_estado.sessaoAtualId);
    } else {
      PL_JS_toast('Nenhuma sessão selecionada para atualizar.', 'erro');
    }
  }

  // ================================================================
  // DROPDOWN DE SESSÕES
  // ================================================================

  function PL_JS_popularDropdown(sessoes) {
    var listContainer = document.getElementById('listaSessoesDropdown');
    listContainer.innerHTML = '';

    sessoes.forEach(function (s) {
      var card = document.createElement('div');
      card.className = 'dropdown-item-card';
      card.setAttribute('data-id', s.id);
      card.onclick = function () { PL_JS_selecionarSessao(s.id); };
      card.innerHTML =
          '<span class="item-data">'  + PL_JS_esc(s.data)  + '</span>' +
          '<span class="item-orgao">' + PL_JS_esc(s.orgao) + '</span>';
      listContainer.appendChild(card);
    });
  }

  /** * Função centralizada de seleção. 
   * Usada pelo clique no dropdown, pelo inicializador e pelo botão atualizar.
   */
  function PL_JS_selecionarSessao(id) {
    PL_estado.sessaoAtualId = id;
    
    // Fecha dropdown
    document.getElementById('listaSessoesDropdown').classList.add('hidden');

    // Destaque visual no dropdown
    document.querySelectorAll('.dropdown-item-card').forEach(function (el) {
      el.classList.toggle('active', el.getAttribute('data-id') == id);
    });

    // Dispara busca no servidor (Sempre busca o dado mais recente)
    PL_JS_carregarPautaNoServidor(id);
  }

  /** Busca real no servidor */
  function PL_JS_carregarPautaNoServidor(sessaoId) {
    PL_JS_mostrarLoading(true);
    
    google.script.run
      .withSuccessHandler(function (dados) {
        // Atualiza o estado e a tela
        PL_JS_onPautaCarregada(dados);
      })
      .withFailureHandler(PL_JS_onErro)
      .PainelLateral_carregarPauta(sessaoId);
  }

  /** Abre ou fecha a lista de sessões ao clicar no cabeçalho */
  function PL_JS_toggleDropdown() {
    var lista = document.getElementById('listaSessoesDropdown');
    if (lista) {
      lista.classList.toggle('hidden');
    }
  }

  // Fecha o dropdown se o usuário clicar em qualquer outro lugar da tela
  window.addEventListener('click', function (e) {
    var drop = document.getElementById('dropdownSessao');
    var lista = document.getElementById('listaSessoesDropdown');
    if (drop && !drop.contains(e.target) && lista) {
      lista.classList.add('hidden');
    }
  });

  // ================================================================
  // RENDERIZAÇÃO DA PAUTA
  // Recebe o objeto completo { sessao, fichas, membros,
  // procuradores, expediente } e atualiza toda a UI.
  // ================================================================

  /** Atualiza a renderização da pauta com lógica condicional */
  function PL_JS_onPautaCarregada(dados) {
    PL_estado.pautasCarregadas[dados.sessao.id] = dados;
    PL_estado.sessaoAtualId  = dados.sessao.id;
    PL_estado.membros        = dados.membros       || [];
    PL_estado.procuradores   = dados.procuradores  || [];
    
    // 1. Lógica do Pleno do SDP (Ocultar Procuradores)
    var ePleno = (dados.sessao.orgao && dados.sessao.orgao.indexOf("Pleno") !== -1);
    document.getElementById('secaoProcuradores').classList.toggle('hidden', ePleno);

    // 2. Preencher Mesa Diretora
    document.getElementById('inputPresidente').value = dados.sessao.presidente || '';
    document.getElementById('inputSecretario').value = dados.sessao.secretario || '';

    // 3. Preencher Expediente (Movido para cima para poder redimensionar)
    var campoExpediente = document.getElementById('expedienteTexto'); // Definindo a variável
    campoExpediente.value = dados.expediente || '';

    // 4. Renderização padrão de cabeçalho
    document.getElementById('displayOrgao').textContent = dados.sessao.orgao || '—';
    document.getElementById('displayData').textContent  = dados.sessao.data  || '—';

    // 5. Atualizações visuais do Materialize
    M.updateTextFields(); // Resolve sobreposição da Mesa
    M.textareaAutoResize(campoExpediente); // Agora a variável existe e o valor já está lá!

    // 6. Renderizar listas
    PL_JS_renderizarFichas(dados.fichas || []);
    PL_JS_renderizarChips('listaMembros', 'badgeMembros', PL_estado.membros, 'PL_JS_removerMembro');
    
    if (!ePleno) {
      PL_JS_renderizarChips('listaProcuradores', 'badgeProcuradores', PL_estado.procuradores, 'PL_JS_removerProcurador');
    }
    
    // Re-inicializa autocompletes
    PL_JS_configurarAutocompletesMesa();
    
    PL_JS_mostrarLoading(false);
    document.getElementById('pautaContainer').classList.remove('hidden');
  }

  /** Salva Presidente e Secretário no servidor */
  function PL_JS_salvarMesa() {
    var pres = document.getElementById('inputPresidente').value;
    var sec = document.getElementById('inputSecretario').value;
    
    google.script.run
      .withSuccessHandler(function() { PL_JS_toast('Mesa atualizada.', 'ok'); })
      .PainelLateral_salvarMesa(PL_estado.sessaoAtualId, pres, sec);
  }

  /** Configura autocompletes específicos para a mesa */
  function PL_JS_configurarAutocompletesMesa() {
    var data = {};
    PL_estado.cacheMembros.forEach(function(n) { data[n] = null; });
    
    //M.Autocomplete.init(document.getElementById('inputPresidente'), { data: data, limit: 5 });
    //M.Autocomplete.init(document.getElementById('inputSecretario'), { data: data, limit: 5 });
  }

  // ================================================================
  // FICHAS DE VOTAÇÃO
  // ================================================================
  function PL_JS_renderizarFichas(fichas) {
    var container = document.getElementById('fichasLista');
    document.getElementById('badgeFichas').textContent = fichas.length;

    if (fichas.length === 0) {
      container.innerHTML = '<div class="empty-state">Nenhuma ficha para esta sessão.</div>';
      return;
    }

    // Verifica se é Pleno buscando o texto que foi inserido no cabeçalho do painel
    var orgaoTexto = document.getElementById('displayOrgao').textContent || "";
    var ePleno = (orgaoTexto.indexOf("Pleno") !== -1);

    container.innerHTML = fichas.map(function (f) {
      var html = [
        '<div class="ficha-card" onclick="PL_JS_gerarDocumentoPeloCard(\'' + f.id + '\')" style="cursor:pointer">',
          '<div class="ficha-nivel1">',
            '<span class="ficha-ordem">' + PL_JS_esc(f.ordem) + 'º</span>',
            '<span class="ficha-processo">' + PL_JS_esc(f.processo) + '</span>',
          '</div>',
          '<div class="ficha-nivel2">',
            '<span class="ficha-label">REQ.</span>',
            '<span class="ficha-valor"><strong>' + PL_JS_esc(f.requerente) + '</strong></span>',
          '</div>'
      ];

      // SÓ ADICIONA O NÍVEL 3 (PROCURADOR) SE NÃO FOR PLENO
      if (!ePleno) {
        html.push(
          '<div class="ficha-nivel3">',
            '<span class="ficha-label">PROC.</span>',
            '<span class="ficha-valor">' + PL_JS_esc(f.procurador) + '</span>',
          '</div>'
        );
      }

      html.push(
          '<div class="ficha-nivel4">',
            '<span class="ficha-label">REL.</span>',
            '<span class="ficha-valor">' + PL_JS_esc(f.relator) + '</span>',
          '</div>',
        '</div>'
      );

      return html.join('');
    }).join('');
  }

  // ================================================================
  // CHIPS — RENDERIZAÇÃO GENÉRICA
  // Utilizada tanto para Membros quanto para Procuradores.
  // callbackRemover: nome da função como string (ex: 'PL_JS_removerMembro')
  // ================================================================
  function PL_JS_renderizarChips(containerId, badgeId, lista, callbackRemover) {
    var container = document.getElementById(containerId);
    document.getElementById(badgeId).textContent = lista.length;

    if (lista.length === 0) {
      container.innerHTML = '<div class="empty-state">Nenhum registro.</div>';
      return;
    }

    container.innerHTML = lista.map(function (nome, i) {
      return [
        '<div class="chip oab-chip">',
          '<span class="chip-nome">' + PL_JS_esc(nome) + '</span>',
          // Aqui o i é o índice do array, e callbackRemover é o nome da função (string)
          '<i class="material-icons close" onclick="' + callbackRemover + '(' + i + ')">close</i>',
        '</div>'
      ].join('');
    }).join('');
  }

  // ================================================================
  // MEMBROS
  // ================================================================
  function PL_JS_adicionarMembro() {
    var input = document.getElementById('inputNovoMembro');
    var nome  = input.value.trim();
    if (!nome || PL_estado.membros.indexOf(nome) !== -1) { input.value = ''; return; }

    PL_estado.membros.push(nome);
    input.value = '';
    PL_JS_renderizarChips('listaMembros', 'badgeMembros', PL_estado.membros, 'PL_JS_removerMembro');
    PL_JS_persistirMembros();
  }

  function PL_JS_removerMembro(indice) {
    PL_estado.membros.splice(indice, 1);
    PL_JS_renderizarChips('listaMembros', 'badgeMembros', PL_estado.membros, 'PL_JS_removerMembro');
    PL_JS_persistirMembros();
  }

  function PL_JS_persistirMembros() {
    google.script.run
      .withSuccessHandler(function () { PL_JS_toast('Membros salvos.', 'ok'); })
      .withFailureHandler(function (e) { PL_JS_toast('Erro: ' + e.message, 'erro'); })
      .PainelLateral_salvarMembros(PL_estado.sessaoAtualId, PL_estado.membros);
  }

  // ================================================================
  // PROCURADORES
  // ================================================================
  function PL_JS_adicionarProcurador() {
    var input = document.getElementById('inputNovoProcurador');
    var nome  = input.value.trim();
    if (!nome || PL_estado.procuradores.indexOf(nome) !== -1) { input.value = ''; return; }

    PL_estado.procuradores.push(nome);
    input.value = '';
    PL_JS_renderizarChips('listaProcuradores', 'badgeProcuradores', PL_estado.procuradores, 'PL_JS_removerProcurador');
    PL_JS_persistirProcuradores();
  }

  function PL_JS_removerProcurador(indice) {
    PL_estado.procuradores.splice(indice, 1);
    PL_JS_renderizarChips('listaProcuradores', 'badgeProcuradores', PL_estado.procuradores, 'PL_JS_removerProcurador');
    PL_JS_persistirProcuradores();
  }

  function PL_JS_persistirProcuradores() {
    google.script.run
      .withSuccessHandler(function () { PL_JS_toast('Procuradores salvos.', 'ok'); })
      .withFailureHandler(function (e) { PL_JS_toast('Erro: ' + e.message, 'erro'); })
      .PainelLateral_salvarProcuradores(PL_estado.sessaoAtualId, PL_estado.procuradores);
  }

  // ================================================================
  // EXPEDIENTE
  // ================================================================
  function PL_JS_salvarExpediente() {
    var texto = document.getElementById('expedienteTexto').value;
    google.script.run
      .withSuccessHandler(function () { PL_JS_toast('Expediente salvo.', 'ok'); })
      .withFailureHandler(function (e) { PL_JS_toast('Erro: ' + e.message, 'erro'); })
      .PainelLateral_salvarExpediente(PL_estado.sessaoAtualId, texto);
  }

  // ================================================================
  // AUTOCOMPLETES CUSTOMIZADOS (INLINE & LEVES)
  // Substitui o sistema pesado do Materialize
  // ================================================================
  function PL_JS_configurarAutocompletes() {
    
    // 1. Configura os campos da Mesa (Presidente e Secretário) com preenchimento INLINE
    // Esses campos não abrem mais aquela lista que cobre o texto.
    var inputPres = document.getElementById('inputPresidente');
    var inputSec  = document.getElementById('inputSecretario');
    
    if(inputPres) PL_JS_aplicarAutocompleteInline(inputPres, PL_estado.cacheMembros || []);
    if(inputSec)  PL_JS_aplicarAutocompleteInline(inputSec, PL_estado.cacheMembros || []);

    // 2. Configura os campos de ADICIONAR (Membros e Procuradores)
    // Aqui mantemos apenas o suporte ao "Enter" para agilizar a inserção
    var elMembro = document.getElementById('inputNovoMembro');
    if (elMembro) {
      PL_JS_aplicarAutocompleteInline(elMembro, PL_estado.cacheMembros || []);
      elMembro.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); PL_JS_adicionarMembro(); }
      });

      // Funcionalidade de "Selecionar Tudo ao Clicar"
      PL_JS_configurarSelecaoAoFocar('inputPresidente');
      PL_JS_configurarSelecaoAoFocar('inputSecretario');
      PL_JS_configurarSelecaoAoFocar('inputNovoMembro');
      PL_JS_configurarSelecaoAoFocar('inputNovoProcurador')
    }

    var elProc = document.getElementById('inputNovoProcurador');
    if (elProc) {
      PL_JS_aplicarAutocompleteInline(elProc, PL_estado.cacheProcuradores || []);
      elProc.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); PL_JS_adicionarProcurador(); }
      });
    }
  }

  /**
   * Lógica de Autocomplete Inline (Typeahead)
   * Preenche o restante do nome conforme o usuário digita.
   */
  function PL_JS_aplicarAutocompleteInline(input, lista) {
    // Remove qualquer instância anterior do Materialize para evitar conflitos
    try {
      var inst = M.Autocomplete.getInstance(input);
      if (inst) inst.destroy();
    } catch(e) {}

    input.addEventListener('keyup', function(e) {
      // Ignora teclas de navegação (Setas, Backspace, Tab, etc)
      if ([8, 46, 37, 38, 39, 40, 9, 13, 16, 17, 18, 20].includes(e.keyCode)) return;

      var digitado = this.value;
      if (digitado.length < 2) return; // Só sugere após 2 letras

      // Busca na lista um nome que comece com o que foi digitado
      var sugestao = lista.find(function(nome) {
        return nome.toLowerCase().startsWith(digitado.toLowerCase());
      });

      if (sugestao) {
        var inicio = digitado.length;
        this.value = sugestao;
        // Seleciona o texto sugerido (o usuário pode apagar ou aceitar com TAB)
        if (this.setSelectionRange) {
          this.setSelectionRange(inicio, sugestao.length);
        }
      }
    });
  }

  /**
   * Faz com que o texto do campo seja selecionado ao receber o foco
   */
  function PL_JS_configurarSelecaoAoFocar(idCampo) {
    var input = document.getElementById(idCampo);
    if (input) {
      // O evento 'focus' garante que funcione ao clicar ou usar TAB
      input.addEventListener('focus', function() {
        // Usamos um pequeno delay (setTimeout) para garantir que o navegador
        // complete o foco antes de tentar selecionar o texto
        setTimeout(function() {
          input.select();
        }, 50);
      });
    }
  }

  // ================================================================
  // FAB (BOTÃO FLUTUANTE) - AÇÕES
  // ================================================================

  /**
   * Abre o modal ou interface para modificar os votantes da ficha atual
   */
  function PL_JS_modificarVotantes() {
    // Exemplo: Chamar uma função no servidor ou abrir um modal
    console.log("Ação: Modificar Votantes");
    google.script.run.PainelLateral_abrirModalVotantes(PL_estado.sessaoAtualId);
  }

  /**
   * Insere um texto padrão no campo de expediente
   */
  function PL_JS_inserirExpedientePredefinido() {
    console.log("Ação: Inserir Expediente");
    // Você pode chamar uma função que busca um texto fixo da sua planilha
    google.script.run
      .withSuccessHandler(function(texto) {
        var campo = document.getElementById('expedienteTexto');
        campo.value = texto;
        M.textareaAutoResize(campo); // Ajusta a altura após inserir
        PL_JS_toast("Expediente predefinido inserido.", "ok");
      })
      .PainelLateral_obterExpedientePadrao();
  }

  /**
   * Salva manualmente os dados da ficha selecionada
   */
  function PL_JS_salvarFicha() {
    console.log("Ação: Salvar Ficha");
    // Aqui você implementaria a lógica de salvar os dados específicos da ficha
    PL_JS_toast("Ficha salva com sucesso!", "ok");
  }

  /**
   * Executa a lógica de apuração de votos
   */
  function PL_JS_apurarResultado() {
    console.log("Ação: Apurar Resultado");
    PL_JS_toast("Iniciando apuração...", "ok");
    google.script.run
      .withSuccessHandler(function(res) {
        PL_JS_toast("Resultado apurado!", "ok");
      })
      .PainelLateral_processarApuracao(PL_estado.sessaoAtualId);
  }

  // ================================================================
  // UTILITÁRIOS DE UI
  // ================================================================

  /** Exibe/oculta o spinner de carregamento */
  function PL_JS_mostrarLoading(ativo) {
    document.getElementById('estadoLoading').classList.toggle('hidden', !ativo);
    if (ativo) document.getElementById('pautaContainer').classList.add('hidden');
  }

  /** Exibe mensagem de erro centralizada */
  function PL_JS_mostrarErro(msg) {
    PL_JS_mostrarLoading(false);
    document.getElementById('mensagemErro').textContent = msg || 'Erro desconhecido.';
    document.getElementById('estadoErro').classList.remove('hidden');
  }

  /** Handler de erro padrão para google.script.run */
  function PL_JS_onErro(err) {
    PL_JS_mostrarErro(err && err.message ? err.message : String(err));
  }

  /**
   * Exibe um toast do Materialize com estilo OAB.
   * @param {string} msg
   * @param {'ok'|'erro'} tipo
   */
  function PL_JS_toast(msg, tipo) {
    M.toast({
      html:      msg,
      classes:   tipo === 'erro' ? 'toast-oab-erro' : 'toast-oab-ok',
      displayLength: 2500
    });
  }

  /** Escapa HTML para evitar XSS ao inserir dados da planilha no DOM */
  function PL_JS_esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  // =================================================================================
  // [BLOCO] DISPARADORES DE GERAÇÃO DE DOCUMENTOS
  // Gerenciam a coleta de dados da UI e chamada ao servidor.
  // =================================================================================

  /**
   * Disparador para Fichas (Individuais)
   * Chamado ao clicar no card da pauta.
   */
  function PL_JS_gerarDocumentoPeloCard(idFicha) {
    const sessaoId = PL_estado.sessaoAtualId;
    const pauta    = PL_estado.pautasCarregadas[sessaoId];
    if (!pauta) return PL_JS_toast('Dados da pauta não carregados.', 'erro');

    const ficha = pauta.fichas.find(function(f) { return f.id == idFicha; });
    if (!ficha)  return PL_JS_toast('Ficha não encontrada.', 'erro');

    // Determina o template antes de chamar o servidor
    const orgao     = document.getElementById('displayOrgao').textContent || '';
    const ePleno    = orgao.indexOf('Pleno') !== -1;
    const templateId = ePleno ? '1IkcUTLayOYuu4IKbiROgTygLk4y3Xs_ELV-KqvXGIr0'
                              : '1Viq_bKZstJ4EharqLSn5HQf_HgWZVcITHDD3UJ5DeBI';

    // Data por extenso gerada no cliente (elimina lógica de data do servidor)
    var meses = ['janeiro','fevereiro','março','abril','maio','junho',
                'julho','agosto','setembro','outubro','novembro','dezembro'];
    var hoje  = new Date();
    var dataExtenso = 'Goiânia, ' + hoje.getDate() + ' de ' +
                      meses[hoje.getMonth()] + ' de ' + hoje.getFullYear();

    // Mapa de substituição completo — servidor não precisará tocar a planilha
    var subs = {
      'tabProcessos.Processo':   ficha.processo    || '',
      'tabProcessos.Requerente': ficha.requerente  || '',
      'tabProcessos.Requerido':  ficha.requerido   || '',
      'tabProcessos.Procurador': ficha.procurador  || '',
      'tabProcessos.Ementa':     ficha.ementa      || '',

      'tabVotos.Voto':           ficha.voto        || '',
      'tabVotos.Resultado':      ficha.resultado   || '',

      'tabFichas.Relator':       ficha.relator     || '',
      'tabFichas.Membros':       PL_estado.membros.join(', '),
      'tabFichas.Expediente':    document.getElementById('expedienteTexto').value || '',

      'tabSessoes.DataSessao':   dataExtenso,
      'tabSessoes.Presidente':   document.getElementById('inputPresidente').value  || '',
      'tabSessoes.Secretário':   document.getElementById('inputSecretario').value  || '',
      'tabSessoes.Órgão':        orgao,

      'Placar.Relator':          String(ficha.votosRelator  || '0'),
      'Placar.Divergência1':     '0',
      'Placar.Divergência2':     '0',
      'Placar.Total':            String(ficha.totalVotantes || '0')
    };

    PL_JS_toast('Montando documento...', 'ok');

    google.script.run
      .withSuccessHandler(function(msg) { PL_JS_toast(msg, 'ok'); })
      .withFailureHandler(function(err) { PL_JS_toast('Erro: ' + err.message, 'erro'); })
      .PainelLateral_gerarDocumentoFicha(templateId, subs);
  }

  /**
   * Disparador para Pauta Completa
   * (Para ser vinculado a um novo botão no FAB ou Header)
   */
  function PL_JS_gerarPautaCompleta() {
      PL_JS_toast("Gerando pauta da sessão...", "ok");
      google.script.run
        .withSuccessHandler(msg => PL_JS_toast(msg, "ok"))
        .PainelLateral_gerarDocumentoPauta(PL_estado.sessaoAtualId);
  }

  /**
   * Disparador para Ata da Sessão
   */
  function PL_JS_gerarAtaSessao() {
      PL_JS_toast("Gerando ata de sessão...", "ok");
      google.script.run
        .withSuccessHandler(msg => PL_JS_toast(msg, "ok"))
        .PainelLateral_gerarDocumentoAta(PL_estado.sessaoAtualId);
  }
  
</script>
