<script>
  /**
   * Frontend — FormProcessos
   * SDP OAB/GO — Gestão de Processos
   */

  // ============================================================
  // ESTADO GLOBAL
  // ============================================================
  let baseProcessos      = [];
  let baseSessoes        = [];
  let baseMembros        = {};
  let pautandoId         = null;
  let sessaoSelecionId   = null;
  let statusProcId       = null;  // Id do processo sendo alternado de status
  let statusNovoValor    = null;  // Novo status calculado antes de abrir o datepicker
  let dataISOPauta       = "";    // Data para nova sessão (datepicker de pauta)
  let dataISOStatus      = "";    // Data para alteração de status (datepicker de status)
  let itensParsedImport  = [];    // Itens parseados antes da confirmação de importação

  const STATUS_MAP = {
    "Em tramitação" : { icone: "pending",       classe: "s-tramitacao" },
    "Arquivado"     : { icone: "archive",        classe: "s-arquivado"  },
    "Deferido"      : { icone: "check_circle",   classe: "s-deferido"   },
    "Indeferido"    : { icone: "cancel",         classe: "s-indeferido" },
    "Em recurso"    : { icone: "refresh",        classe: "s-recurso"    },
    "Em diligência" : { icone: "manage_search",  classe: "s-diligencia" },
    "Concluso"      : { icone: "task_alt",       classe: "s-concluso"   },
    "Na secretaria" : { icone: "inbox",          classe: "s-secretaria" }
  };

  // ============================================================
  // INICIALIZAÇÃO
  // ============================================================
  document.addEventListener('DOMContentLoaded', function () {
    M.AutoInit();
    M.FloatingActionButton.init(document.querySelectorAll('.fixed-action-btn'), { hoverEnabled: true });

    // Modais não dismissíveis
    ['modalConfirmacao', 'modalPauta', 'modalStatus', 'modalImportar'].forEach(id => {
      const el = document.getElementById(id);
      if (el) M.Modal.init(el, { dismissible: false });
    });

    _initDatepicker('proc_novaDataPicker', function(d) {
      dataISOPauta = _dateToISO(d);
    });
    _initDatepicker('proc_statusDataPicker', function(d) {
      dataISOStatus = _dateToISO(d);
    });

    formProcessos_carregar();
    
    inicializarDadosCidades(); 

  });

  // ============================================================
  // DATA PICKER
  // ============================================================

  // Função unificada para inicializar datepickers
  function _initDatepicker(elementId, onSelectCallback) {
    const el = document.getElementById(elementId);
    if (!el) return;
    
    M.Datepicker.init(el, {
      format: 'dd/mm/yyyy',
      autoClose: true,
      container: 'body', // Garante que o calendário não fique preso ao modal
      i18n: _i18nPtBR(),
      onSelect: function(d) {
        if (onSelectCallback) onSelectCallback(d);
      }
    });
  }

  function _i18nPtBR() {
    return {
      cancel: 'Cancelar', clear: 'Limpar', done: 'OK',
      months: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
               'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
      monthsShort: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
      weekdays: ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'],
      weekdaysShort: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
      weekdaysAbbrev: ['D','S','T','Q','Q','S','S']
    };
  }

  function _dateToISO(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // ============================================================
  // CARREGAMENTO E RENDERIZAÇÃO
  // ============================================================

  function formProcessos_carregar() {
    const loader    = document.getElementById('loaderLista');
    const container = document.getElementById('listaProcessos');
    loader.style.display    = 'block';
    container.style.opacity = '0.4';

    google.script.run
      .withSuccessHandler(function (res) {
        loader.style.display    = 'none';
        container.style.opacity = '1';
        if (res.sucesso) {
          baseProcessos = res.dados   || [];
          baseSessoes   = res.sessoes || [];
          baseMembros   = res.membros || {};
          formProcessos_renderizar(baseProcessos);
        } else {
          M.toast({ html: 'Erro ao carregar: ' + res.erro, classes: 'red darken-2' });
        }
      })
      .withFailureHandler(function () {
        loader.style.display    = 'none';
        container.style.opacity = '1';
        M.toast({ html: 'Falha crítica no servidor.', classes: 'red darken-2' });
      })
      .formProcessos_buscarDadosCompletos();
  }

  function formProcessos_renderizar(lista) {
    const container = document.getElementById('listaProcessos');
    container.innerHTML = '';

    if (!lista || lista.length === 0) {
      container.innerHTML = `
        <div style="text-align:center; padding:50px; color:#aaa;">
          <i class="material-icons" style="font-size:48px; display:block; margin-bottom:14px;">gavel</i>
          <p>Nenhum processo encontrado.</p>
        </div>`;
      return;
    }

    lista.forEach(p => {
      const reqCl  = !p.requerente ? 'text-missing' : '';
      const resCl  = !p.requerido  ? 'text-missing' : '';
      const procCl = !p.procurador ? 'text-missing' : '';

      // 1. Chip de Status Original
      const statusCfg = STATUS_MAP[p.status] || null;
      const chipHTML  = statusCfg
        ? `<span class="status-chip ${statusCfg.classe}">
            <i class="material-icons" style="font-size:11px">${statusCfg.icone}</i>${p.status}
          </span>`
        : (p.status ? `<span class="status-chip s-vazio">${p.status}</span>` : '');

      // 2. NOVA ETIQUETA: Pílula de Pauta (Aparece apenas se p.dataPauta existir)
      // Usando o azul escuro padrão do projeto (#002f5d)
      const pautaHTML = p.dataPauta 
        ? `<span class="pauta-pill" style="background-color: #002f5d; color: white; padding: 2px 10px; border-radius: 50px; font-size: 0.65rem; font-weight: 700; margin-left: 8px; display: inline-flex; align-items: center; gap: 4px; vertical-align: middle; text-transform: uppercase;">
            <i class="material-icons" style="font-size:12px">event</i>Pautado para ${p.dataPauta}
          </span>` 
        : '';

      // 3. Ícones e Tooltips de Status
      const isConcl  = p.status === 'Concluso';
      const statusIcone    = isConcl  ? 'inbox'     : 'task_alt';
      const statusClasse   = isConcl  ? 'c-secretaria' : 'c-concluso';
      const statusTooltip  = isConcl  ? 'Mover para Na secretaria' : 'Marcar como Concluso';
      const novoStatusCalc = isConcl  ? 'Na secretaria' : 'Concluso';

      const idSafe   = _esc(p.id);
      const numSafe  = _esc(p.processo);
      const descSafe = _esc(p.ultimaDesc || "").substring(0, 120);

      const card = document.createElement('div');
      card.className = 'collection-item-processo';
      card.innerHTML = `
        <div class="p-col-info">
          <span class="lvl-1">
            ${p.processo || '<span class="text-missing">S/N</span>'}
            ${chipHTML}
            ${pautaHTML}
          </span>
          <span class="lvl-2 ${reqCl}">
            <i class="material-icons lvl-icon">arrow_forward</i>
            <b>Requerente:</b> ${p.requerente || 'Não informado'}
          </span>
          <span class="lvl-3 ${resCl}">
            <i class="material-icons lvl-icon">arrow_back</i>
            <b>Requerido:</b> ${p.requerido || 'Não informado'}
          </span>
          <span class="lvl-4 ${procCl}">
            <i class="material-icons lvl-icon">gavel</i>
            <b>Procurador:</b> ${p.procurador || 'Pendente'}
          </span>
          <span class="lvl-5">
            <i class="material-icons lvl-icon">location_on</i>
            ${p.local || '<span style="color:#bbb">Local não informado</span>'}
          </span>
        </div>

        <div class="p-col-hist">
          <span class="h-lvl-1">Último Evento</span>
          <span class="h-lvl-2">${p.ultimaData}</span>
          <span class="h-lvl-3" title="${descSafe}">${p.ultimaDesc || 'Sem registros'}</span>
        </div>

        <div class="p-col-actions">
          <i class="material-icons act-btn c-edit tooltipped"
            data-tooltip="Visualizar / Editar"
            onclick="abrirEditar('${idSafe}')">visibility</i>

          <i class="material-icons act-btn c-hist tooltipped"
            data-tooltip="Ver histórico"
            onclick="abrirHistorico('${idSafe}', '${numSafe}')">history</i>

          <i class="material-icons act-btn c-pauta tooltipped"
            data-tooltip="Incluir na pauta"
            onclick="incluirPauta('${idSafe}', '${numSafe}')">event_note</i>

          <i class="material-icons act-btn ${statusClasse} tooltipped"
            data-tooltip="${statusTooltip}"
            onclick="abrirModalStatus('${idSafe}', '${numSafe}', '${_esc(novoStatusCalc)}', '${_esc(p.status)}')">
            ${statusIcone}
          </i>

          <i class="material-icons act-btn c-del tooltipped"
            data-tooltip="Excluir"
            onclick="deletarProc('${idSafe}', '${numSafe}')">delete</i>
        </div>
      `;
      container.appendChild(card);
    });

    // Reinicializa tooltips do Materialize
    M.Tooltip.init(document.querySelectorAll('.tooltipped'));
  }

  // ============================================================
  // FILTRO
  // ============================================================

  function formProcessos_filtrar() {
    const termo = (document.getElementById('inputBuscaProc').value || '').toLowerCase().trim();
    if (!termo) { formProcessos_renderizar(baseProcessos); return; }

    const filtrados = baseProcessos.filter(p =>
      (p.processo   || "").toLowerCase().includes(termo) ||
      (p.requerente || "").toLowerCase().includes(termo) ||
      (p.requerido  || "").toLowerCase().includes(termo) ||
      (p.procurador || "").toLowerCase().includes(termo) ||
      (p.status     || "").toLowerCase().includes(termo)
    );
    formProcessos_renderizar(filtrados);
  }

  // ============================================================
  // MODAL DE CADASTRO / EDIÇÃO
  // ============================================================

  function abrirNovoProcesso() {
    document.getElementById('procForm').reset();
    document.getElementById('proc_f_Id').value = '';
    document.getElementById('procModalTitulo').innerText = 'Novo Processo';
    
    // Limpar o campo de status visual (etiqueta)
    document.getElementById('status-display-container').innerHTML = '';

    M.updateTextFields();
    
    // Reinicializa o select de status se ele ainda existir no seu HTML
    const selStatus = document.getElementById('proc_f_Status');
    if(selStatus) M.FormSelect.init(selStatus);
    
    _abrirModal('modalProcessoCad');
  }

  let mapaCidadesProcuradores = {}; // Variável global para armazenar os dados

// Chame esta função quando o sistema carregar
function inicializarDadosCidades() {
  google.script.run
    .withSuccessHandler(function(data) {
      mapaCidadesProcuradores = data; // Salva o objeto { "CIDADE": "PROCURADOR" }
      
      const inputLocal = document.getElementById('proc_f_Local');
      
      // Destrói qualquer instância anterior do autocomplete (se houver)
      const instance = M.Autocomplete.getInstance(inputLocal);
      if (instance) instance.destroy();
      
      // Transforma as chaves do objeto para o formato do Materialize: { "ALEXÂNIA": null, ... }
      const dadosParaAutocomplete = {};
      for (let cidade in data) {
        dadosParaAutocomplete[cidade] = null;
      }

      // Inicializa o Autocomplete no campo Local
      M.Autocomplete.init(inputLocal, {
        data: dadosParaAutocomplete,
        limit: 5,
        onAutocomplete: function(cidadeSelecionada) {
          const procuradorResponsavel = mapaCidadesProcuradores[cidadeSelecionada];
          const campoProcurador = document.getElementById('proc_f_Procurador');
          
          if (procuradorResponsavel) {
            campoProcurador.value = procuradorResponsavel;
            M.updateTextFields(); // Atualiza o label do campo procurador
          }
        }
      });
    })
    .withFailureHandler(function(error) {
      console.error('Erro ao carregar cidades:', error);
      M.toast({ html: 'Erro ao carregar lista de cidades.', classes: 'red darken-2' });
    })
    .buscarDadosCidadesEProcuradores();
}

function abrirEditar(id) {
  const p = baseProcessos.find(x => x.id === id);
  if (!p) return M.toast({ html: 'Processo não encontrado.', classes: 'orange darken-3' });

  document.getElementById('procForm').reset();
  document.getElementById('procModalTitulo').innerText = 'Visualizar / Editar Processo';

  // População dos campos
  document.getElementById('proc_f_Id').value = p.id;
  document.getElementById('proc_f_Processo').value = p.processo;
  document.getElementById('proc_f_Local').value = p.local || '';
  document.getElementById('proc_f_Requerente').value = p.requerente || '';
  document.getElementById('proc_f_Requerido').value = p.requerido || '';
  document.getElementById('proc_f_Procurador').value = p.procurador || '';
  document.getElementById('proc_f_Status').value = p.status || '';
  document.getElementById('proc_f_Resumo').value = p.resumo || '';
  document.getElementById('proc_f_Ementa').value = p.ementa || '';
  document.getElementById('proc_f_Provas').value = p.provas || '';

  // --- LÓGICA DA ETIQUETA DE STATUS ---
  const containerStatus = document.getElementById('status-display-container');
  let classeStatus = 'st-secretaria';
  const statusAtual = (p.status || '').toLowerCase();
  
  if(statusAtual === 'concluso') classeStatus = 'st-concluso';
  if(statusAtual === 'arquivado') classeStatus = 'st-arquivado';
  
  containerStatus.innerHTML = `<span class="status-label ${classeStatus}">${p.status || 'Sem Status'}</span>`;
  // ------------------------------------

  M.updateTextFields();
  
  // Redimensionar textareas
  const campos = ['proc_f_Requerente', 'proc_f_Requerido', 'proc_f_Resumo', 'proc_f_Ementa', 'proc_f_Provas'];
  campos.forEach(fid => {
    const el = document.getElementById(fid);
    if (el) M.textareaAutoResize(el);
  });

  _abrirModal('modalProcessoCad');
}

// Lembre-se de chamar inicializarDadosCidades() no window.onload ou DOMContentLoaded do seu sistema

  function _autocompleteInit() {
    M.Autocomplete.init(document.getElementById('proc_f_Procurador'), {
      data: baseMembros, minLength: 2, limit: 6
    });
  }

  function formProcessos_salvar() {
    const numero     = (document.getElementById('proc_f_Processo').value  || '').trim();
    const requerente = (document.getElementById('proc_f_Requerente').value || '').trim();

    if (!numero || !requerente) {
      return M.toast({ html: 'Número do processo e Requerente são obrigatórios.', classes: 'red darken-2' });
    }

    const btn = document.getElementById('procBtnSalvar');
    btn.disabled  = true;
    btn.innerHTML = 'Processando...';

    const requerenteFormatado = formatarNomeCompleto(requerente);
    const requeridoFormatado = formatarNomeCompleto(document.getElementById('proc_f_Requerido').value);
    const procuradorFormatado = formatarNomeCompleto(document.getElementById('proc_f_Procurador').value);

    const obj = {
      id:         document.getElementById('proc_f_Id').value || '',
      processo:   numero,
      requerente: requerente,
      requerido:  document.getElementById('proc_f_Requerido').value,
      procurador: document.getElementById('proc_f_Procurador').value,
      local:      document.getElementById('proc_f_Local').value,
      status:     document.getElementById('proc_f_Status').value,
      resumo:     document.getElementById('proc_f_Resumo').value,
      ementa:     document.getElementById('proc_f_Ementa').value,
      provas:     document.getElementById('proc_f_Provas').value
    };

    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Processo salvo com sucesso!', classes: 'green darken-2' });
        btn.disabled  = false;
        btn.innerHTML = '<i class="material-icons left">save</i>Salvar';
        M.Modal.getInstance(document.getElementById('modalProcessoCad')).close();
        formProcessos_carregar();
      })
      .withFailureHandler(function (err) {
        M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
        btn.disabled  = false;
        btn.innerHTML = '<i class="material-icons left">save</i>Salvar';
      })
      .formProcessos_salvarRegistro(obj);
  }

  // ============================================================
  // MODAL DE HISTÓRICO
  // ============================================================

  function abrirHistorico(id, numero) {
    document.getElementById('histModalTitulo').textContent = 'Histórico — Processo nº ' + (numero || id);
    const lista = document.getElementById('histLista');
    lista.innerHTML = `<div class="hist-vazio"><i class="material-icons" style="font-size:32px;display:block;margin-bottom:8px;color:#ccc">hourglass_empty</i>Carregando...</div>`;

    _abrirModal('modalHistorico');

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.sucesso) {
          lista.innerHTML = `<div class="hist-vazio">${res.erro}</div>`;
          return;
        }
        _renderizarHistorico(res.registros);
      })
      .withFailureHandler(function (err) {
        lista.innerHTML = `<div class="hist-vazio">Erro: ${err.message}</div>`;
      })
      .formProcessos_buscarHistorico(id);
  }

  function _renderizarHistorico(registros) {
    const lista = document.getElementById('histLista');

    if (!registros || registros.length === 0) {
      lista.innerHTML = `<div class="hist-vazio"><i class="material-icons" style="font-size:36px;display:block;color:#ccc;margin-bottom:10px;">history_toggle_off</i>Nenhum registro de histórico encontrado.</div>`;
      return;
    }

    const tipoClasse = (tipo) => {
      const t = (tipo || "").toLowerCase();
      if (t.includes('andamento'))  return 'tipo-andamento';
      if (t.includes('sessão') || t.includes('sessao')) return 'tipo-sessao';
      if (t.includes('ato'))        return 'tipo-ato';
      return 'tipo-outro';
    };

    const itensHTML = registros.map(r => `
      <div class="hist-item">
        <div class="h-col-data">${r.data}</div>
        <div class="h-col-tipo">
          <span class="hist-tipo-chip ${tipoClasse(r.tipo)}">${r.tipo || '—'}</span>
        </div>
        <div class="h-col-desc">${r.descricao || '—'}</div>
      </div>
    `).join('');

    lista.innerHTML = `
      <div class="hist-header">
        <span class="h-col-data">Data</span>
        <span class="h-col-tipo">Tipo</span>
        <span class="h-col-desc">Descrição</span>
      </div>
      ${itensHTML}
    `;
  }

  // ============================================================
  // MODAL DE ALTERAÇÃO DE STATUS (Concluso ↔ Na secretaria)
  // ============================================================

  function abrirModalStatus(id, numero, novoStatus, statusAtual) {
  statusProcId    = id;
  statusNovoValor = novoStatus;

  // Define a data atual como padrão
  const hoje = new Date();
  dataISOStatus = _dateToISO(hoje); // formato yyyy-mm-dd

  // Preenche o campo datepicker com a data formatada dd/mm/aaaa
  const dpEl = document.getElementById('proc_statusDataPicker');
  if (dpEl) {
    const dia = String(hoje.getDate()).padStart(2, '0');
    const mes = String(hoje.getMonth() + 1).padStart(2, '0');
    const ano = hoje.getFullYear();
    dpEl.value = `${dia}/${mes}/${ano}`;
    M.updateTextFields();
  }

  // Atualiza o display visual dentro do modal
  const cfgDe  = STATUS_MAP[statusAtual] || { classe: 's-vazio' };
  const cfgPara = STATUS_MAP[novoStatus]  || { classe: 's-concluso' };

  document.getElementById('statusDeTexto').textContent   = statusAtual  || '(sem status)';
  document.getElementById('statusParaTexto').textContent = novoStatus;
  document.getElementById('statusDeChip').className      = 'status-de ' + cfgDe.classe;
  document.getElementById('statusParaChip').className    = 'status-para ' + cfgPara.classe;
  document.getElementById('statusProcNumero').textContent = 'Processo nº ' + (numero || id);

  _abrirModal('modalStatus');
}

  function confirmarAlteracaoStatus() {
    if (!dataISOStatus) {
      return M.toast({ html: 'Selecione a data da mudança de status.', classes: 'orange darken-3' });
    }

    const btn = document.getElementById('statusBtnConfirmar');
    btn.disabled    = true;
    btn.textContent = 'Processando...';

    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Status alterado com sucesso!', classes: 'green darken-2' });
        M.Modal.getInstance(document.getElementById('modalStatus')).close();
        btn.disabled    = false;
        btn.textContent = 'Confirmar';
        formProcessos_carregar();
      })
      .withFailureHandler(function (err) {
        M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
        btn.disabled    = false;
        btn.textContent = 'Confirmar';
      })
      .formProcessos_alterarStatus(statusProcId, statusNovoValor, dataISOStatus);
  }

  // ============================================================
  // MODAL DE PAUTA (LOGICA ATUALIZADA)
  // ============================================================

  function incluirPauta(id, numero) {
    pautandoId = id;
    sessaoSelecionId = null;
    dataISOPauta = "";

    document.getElementById('pautaProcNumero').textContent = 'Processo nº ' + (numero || id);

    // Reset do painel de nova sessão (inicia fechado)
    pauta_toggleNovaSessao(false);

    // Limpa campos do formulário de nova sessão
    document.getElementById('proc_novaSessaoOrgao').value = '';
    document.getElementById('proc_novaSessaoLocal').value = '';
    const dpPauta = document.getElementById('proc_novaDataPicker');
    if (dpPauta) { dpPauta.value = ''; }
    
    M.updateTextFields();
    M.FormSelect.init(document.getElementById('proc_novaSessaoOrgao'));

    _renderizarListaSessoes();
    _abrirModal('modalPauta');
  }

  /**
   * Alterna a exibição do formulário de nova sessão acima da lista
   */
  function pauta_toggleNovaSessao(exibir) {
    const painelNova = document.getElementById('pautaPainel_nova');
    const btnAdd = document.getElementById('pautaBtnAddSessao');
    const btnConfirmar = document.getElementById('pautaBtnConfirmar');

    if (exibir) {
      painelNova.style.display = 'block'; 
      btnAdd.style.display = 'none';
      btnConfirmar.textContent = 'Criar Sessão e Incluir';
      
      // Apenas limpa o campo de data (não precisa reinicializar)
      document.getElementById('proc_novaDataPicker').value = '';
      M.updateTextFields();

      document.querySelectorAll('.sessao-item').forEach(el => el.classList.remove('selecionado'));
      sessaoSelecionId = null;
    } else {
      painelNova.style.display = 'none';
      btnAdd.style.display = 'inline-block';
      btnConfirmar.textContent = 'Confirmar Inclusão';
    }
  }

  function _renderizarListaSessoes() {
    const container = document.getElementById('sessaoLista');
    container.innerHTML = '';

    if (!baseSessoes || baseSessoes.length === 0) {
      container.innerHTML = '<div class="sessao-lista-vazia">Nenhuma sessão cadastrada ainda.</div>';
      return;
    }

    baseSessoes.forEach(s => {
      const item = document.createElement('div');
      item.className = 'sessao-item';
      item.setAttribute('data-id', s.id);
      item.innerHTML = `
        <div class="sessao-item-data"><span>${s.data}</span></div>
        <div style="flex:1">
          <div class="sessao-item-orgao">${s.orgao}</div>
          ${s.local ? `<span class="sessao-item-local">${s.local}</span>` : ''}
        </div>
      `;
      item.onclick = function () {
        // Se clicar em um item da lista, fecha o formulário de nova sessão se estiver aberto
        pauta_toggleNovaSessao(false);
        
        document.querySelectorAll('.sessao-item').forEach(el => el.classList.remove('selecionado'));
        this.classList.add('selecionado');
        sessaoSelecionId = this.getAttribute('data-id');
      };
      container.appendChild(item);
    });
  }

    const btn = document.getElementById('pautaBtnConfirmar');
    
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Processando...';
    
    const reset = () => { btn.disabled = false; btn.textContent = originalText; };

    // MODO 1: CRIAR NOVA SESSÃO E PAUTAR

      const orgao = document.getElementById('proc_novaSessaoOrgao').value;

      if (!orgao) { reset(); return M.toast({ html: 'Selecione o Órgão.', classes: 'orange darken-3' }); }
      if (!dataISOPauta) { reset(); return M.toast({ html: 'Selecione a Data.', classes: 'orange darken-3' }); }

      google.script.run
        .withSuccessHandler(function (res) {
          M.toast({ html: 'Sessão criada e processo incluído!', classes: 'green darken-2' });
          M.Modal.getInstance(document.getElementById('modalPauta')).close();
          formProcessos_carregar(); // Recarrega para atualizar cache de sessões
          reset();
        })
        .withFailureHandler(function (err) {

          reset();

  /**
   * Faz o parse do texto colado pelo usuário.
   * Formato esperado: colunas separadas por TAB ou múltiplos espaços.
   * Ordem: Processo | Data | Hora | Requerente
   * Linhas de cabeçalho e vazias são ignoradas automaticamente.
   */
  function importar_parsear() {
    const texto = document.getElementById('importarTexto').value;
    const contagem = document.getElementById('importarContagem');
    const preview = document.getElementById('importarPreview');
    const tbody = document.getElementById('importarTbody');

    contagem.textContent = '';
    preview.style.display = 'none';
    itensParsedImport = [];

    if (!texto.trim()) return;

    const linhas = texto.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
    const itens = [];

    linhas.forEach(linha => {
      // Remove pipes e espaços no início/fim
      let linhaLimpa = linha.replace(/^[\s|]+|[\s|]+$/g, '');

      // Tenta dividir por pipe
      let partes = linhaLimpa.split('|').map(p => p.trim()).filter(p => p);
      if (partes.length >= 4) {
        // Se a primeira parte não for numérica, ignora (cabeçalho)
        if (!/^\d+$/.test(partes[0])) return;
        const processo = partes[0];
        const data = partes[1];
        const hora = partes[2];
        let requerente = partes[3];
        let requerido = partes.length >= 5 ? partes[4] : '';
        // Valida formato da data
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(data)) return;
        // Aplica formatação
        itens.push({
          processo, data, hora,
          requerente: formatarNomeCompleto(requerente),
          requerido: formatarNomeCompleto(requerido)
        });
        return;
      }

      // Tenta por tabulação
      partes = linhaLimpa.split('\t').map(p => p.trim()).filter(p => p);
      if (partes.length >= 4 && /^\d+$/.test(partes[0])) {
        const processo = partes[0];
        const data = partes[1];
        const hora = partes[2];
        let requerente = partes[3];
        let requerido = partes.length >= 5 ? partes[4] : '';
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(data)) return;
        itens.push({
          processo, data, hora,
          requerente: formatarNomeCompleto(requerente),
          requerido: formatarNomeCompleto(requerido)
        });
        return;
      }

      // Tenta por múltiplos espaços (2 ou mais)
      partes = linhaLimpa.split(/\s{2,}/).map(p => p.trim()).filter(p => p);
      if (partes.length >= 4 && /^\d+$/.test(partes[0])) {
        const processo = partes[0];
        const data = partes[1];
        const hora = partes[2];
        let requerente = partes[3];
        let requerido = partes.length >= 5 ? partes[4] : '';
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(data)) return;
        itens.push({
          processo, data, hora,
          requerente: formatarNomeCompleto(requerente),
          requerido: formatarNomeCompleto(requerido)
        });
        return;
      }

      // Se tudo falhar, tenta a regex flexível
      const regex = /^\s*(\d+)\D+(\d{2}\/\d{2}\/\d{4})\D+(\d{2}:\d{2})\D+(.*)$/;
      const match = linha.match(regex);
      if (match) {
        const processo = match[1];
        const data = match[2];
        const hora = match[3];
        let resto = match[4].trim();

        // Se o resto contiver pipe, divide
        let requerente, requerido;
        if (resto.includes('|')) {
          const partesResto = resto.split('|').map(p => p.trim());
          requerente = partesResto[0];
          requerido = partesResto.length > 1 ? partesResto[1] : '';
        } else {
          requerente = resto;
          requerido = '';
        }
        itens.push({
          processo, data, hora,
          requerente: formatarNomeCompleto(requerente),
          requerido: formatarNomeCompleto(requerido)
        });
        return;
      }

      // Se chegou aqui, linha não reconhecida, mas não exibimos erro ainda
    });

    itensParsedImport = itens;

    if (itens.length === 0) {
      contagem.className = 'importar-contagem erro';
      contagem.textContent = 'Nenhuma linha válida reconhecida. Verifique o formato.';
      preview.style.display = 'none';
      return;
    }

    contagem.className = 'importar-contagem';
    contagem.textContent = `${itens.length} linha(s) reconhecida(s).`;

    // Preview das primeiras 50 linhas
    const linhasPreview = itens.slice(0, 50);
    tbody.innerHTML = linhasPreview.map(item => `
      <tr>
        <td>${item.processo}</td>
        <td>${item.data} ${item.hora}</td>
        <td>${item.requerente}</td>
        <td>${item.requerido || ''}</td>
      </tr>
    `).join('');

    preview.style.display = 'block';
  }

  function importar_confirmar() {
    if (!itensParsedImport || itensParsedImport.length === 0) {
      return M.toast({ html: 'Nenhum dado para importar. Cole o texto e clique em Processar.', classes: 'orange darken-3' });
    }

    const btn = document.getElementById('importarBtnConfirmar');
    btn.disabled    = true;
    btn.textContent = 'Importando...';

    google.script.run
      .withSuccessHandler(function (res) {
        M.toast({ html: res.mensagem, classes: 'green darken-2' });
        M.Modal.getInstance(document.getElementById('modalImportar')).close();
        btn.disabled    = false;
        btn.textContent = 'Importar';
        formProcessos_carregar();
      })
      .withFailureHandler(function (err) {
        M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
        btn.disabled    = false;
        btn.textContent = 'Importar';
      })
      .formProcessos_importarEmMassa(itensParsedImport);
  }

  /**
   * Alterna a visibilidade do painel de IA e ajusta o posicionamento
   */
  function ia_togglePainel() {
    const painel = document.getElementById('secaoIA');
    const modalContent = document.querySelector('#modalProcessoCad .modal-content');
    
    if (painel.style.display === 'none' || painel.style.display === '') {
      painel.style.display = 'block';
      
      // Aguarda o render e rola para baixo
      setTimeout(() => {
        modalContent.scrollTo({
          top: modalContent.scrollHeight,
          behavior: 'smooth'
        });
        document.getElementById('ia_input_peticao').focus();
      }, 150);
    } else {
      painel.style.display = 'none';
    }
  }

  /**
   * Envia texto para extração e preenche os campos do formulário
   */
  function ia_processarPeticao() {
    const texto = document.getElementById('ia_input_peticao').value;
    if (!texto || texto.length < 30) {
      return M.toast({html: 'Por favor, cole o texto da petição ou portaria.', classes: 'orange'});
    }

    const btn = document.getElementById('btnIAExtrair');
    const originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="material-icons left">hourglass_empty</i>Processando...';

    google.script.run
      .withSuccessHandler(function(resRaw) {
        btn.disabled = false;
        btn.innerHTML = originalHtml;
        
        try {
          // Localiza o objeto JSON dentro da resposta (blindagem contra Markdown ou Thoughts)
          const i = resRaw.indexOf('{');
          const f = resRaw.lastIndexOf('}');
          if (i === -1 || f === -1) throw new Error("JSON não localizado.");
          
          const dados = JSON.parse(resRaw.substring(i, f + 1));
          
          // 1. Requerido (Preenche se vazio)
          const campoReq = document.getElementById('proc_f_Requerido');
          if (!campoReq.value.trim() && dados.requerido) {
            campoReq.value = formatarNomeCompleto(dados.requerido);
          }

          // 2. Ementa e Resumo
          if (dados.ementa) document.getElementById('proc_f_Ementa').value = dados.ementa;
          if (dados.resumo) document.getElementById('proc_f_Resumo').value = dados.resumo;

          // 3. Cidade e Procurador (Integração com o Autocomplete)
          if (dados.cidade && dados.cidade.toLowerCase() !== "não identificado") {
            const campoLocal = document.getElementById('proc_f_Local');
            campoLocal.value = dados.cidade.toUpperCase();
            
            // Busca o procurador no mapa global carregado no início
            const procResponsavel = mapaCidadesProcuradores[campoLocal.value];
            if (procResponsavel) {
              document.getElementById('proc_f_Procurador').value = procResponsavel;
            }
          }

          // 4. Atualização Visual
          M.updateTextFields();
          ['proc_f_Requerido', 'proc_f_Ementa', 'proc_f_Resumo'].forEach(id => {
            const el = document.getElementById(id);
            if (el) M.textareaAutoResize(el);
          });
          
          M.toast({html: 'Dados extraídos com sucesso!', classes: 'green'});
          
          // Fecha o painel e volta ao topo
          ia_togglePainel();
          document.querySelector('#modalProcessoCad .modal-content').scrollTo({top: 0, behavior: 'smooth'});

        } catch (e) {
          console.error(e);
          M.toast({html: 'Erro ao interpretar dados da IA.', classes: 'red'});
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.innerHTML = originalHtml;
        M.toast({html: 'Erro: ' + err.message, classes: 'red'});
      })
      .ia_processarPeticaoBackEnd(texto);
  }

  function _esc(str) {
    return (str || '').toString()
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '&quot;');
  }

  /**
   * Formata um nome completo para o padrão:
   * - Primeira letra de cada palavra em maiúscula, exceto preposições comuns (da, de, do, etc.)
   * - Siglas conhecidas (UFs, órgãos) são mantidas em CAIXA ALTA
   * - Palavras com hífen são tratadas individualmente
   * @param {string} nome - Nome completo a ser formatado
   * @returns {string} Nome formatado
   */
  function formatarNomeCompleto(nome) {
    if (!nome) return "";
    
    // Lista de siglas conhecidas (em maiúsculas)
    const siglas = new Set([
      // Unidades da Federação
      "AC", "AL", "AP", "AM", "BA", "CE", "DF", "ES", "GO", "MA", "MT", "MS",
      "MG", "PA", "PB", "PR", "PE", "PI", "RJ", "RN", "RS", "RO", "RR", "SC",
      "SP", "SE", "TO",
      // Órgãos e instituições comuns
      "OAB", "CNJ", "STF", "STJ", "TST", "TSE", "TRF", "TJ", "TRT", "TRE",
      "MP", "MPT", "DP", "DPE", "DPG", "AGU", "PGE", "PGJ", "PF", "PRF", "PC",
      "PM", "BM", "CBM", "SESP", "SSP", "SEDS", "SEJUS", "SEGUP", "SEDUC",
      "SES", "SEFAZ", "SEGOV", "SEGEP", "SEPLAG", "SEPLAN", "SEPOG", "SEPP",
      "CGE", "TCE", "TCM", "CREA", "CRP", "CRM", "CRO", "CRB", "CRF", "COREN",
      "CREF", "CREFITO", "CRMV", "CRAS", "CREAS", "SUAS", "SUS", "SUFRAMA",
      "SUDAM", "SUDENE", "INCRA", "IBAMA", "ICMBio", "FUNAI", "FUNASA",
      "ANVISA", "ANS", "ANATEL", "ANP", "ANA", "ANAC", "ANTT", "ANTAQ",
      "ANCINE", "ANEEL", "ANT", "AGER", "AGEP", "AGEM", "AGESC", "AGEPAR",
      "AGERGS", "ARSESP", "ARPB", "ARPE", "AGR", "ADASA",
      "DGPP", "CPP", "DGAP", "POG"
    ]);

    // Preposições que devem permanecer em minúsculas
    const preposicoes = new Set([
      "da", "de", "di", "do", "dos", "das", "e", "del", "von", "y"
    ]);

    // Função auxiliar para processar uma palavra (pode conter hífen)
    function formatarPalavra(palavra) {
      // Se a palavra contém hífen, processa cada parte
      if (palavra.includes('-')) {
        return palavra.split('-')
          .map(parte => formatarPalavra(parte))
          .join('-');
      }

      const palavraLower = palavra.toLowerCase();

      // Se for preposição, retorna minúscula
      if (preposicoes.has(palavraLower)) {
        return palavraLower;
      }

      // Se for sigla conhecida (case-insensitive), retorna maiúscula
      if (siglas.has(palavra.toUpperCase())) {
        return palavra.toUpperCase();
      }

      // Caso contrário, capitaliza a primeira letra e minúsculas no resto
      if (palavra.length > 0) {
        return palavra.charAt(0).toUpperCase() + palavra.slice(1).toLowerCase();
      }
      return palavra;
    }

    // Divide o nome em palavras (espaços)
    const palavras = nome.trim().split(/\s+/);
    const nomeFormatado = palavras.map(formatarPalavra).join(' ');

    return nomeFormatado;
  }
