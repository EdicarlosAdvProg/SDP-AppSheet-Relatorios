<script>
  /**
   * Frontend — FormSessoes
   * SDP OAB/GO — Gestão de Sessões
   */

  // ============================================================
  // ESTADO GLOBAL
  // ============================================================
  let baseSessoes = [];
  let baseMembros = {};
  let baseLocais  = {};
  let sessaoDataISO = '';
  let fichaAtualId = '';
  let fichaAtualIdProc = '';
  let pdfSelecionado = null;
  let sessaoAtualId = '';
  let fichasDaSessao = [];
  let sortableInstance = null;
  let fichaSelecionadaOriginal = null;
  let participantesAtuais = [];
  //let procuradoresAtuais = [];

  const MESES_PT = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

  // ============================================================
  // INICIALIZAÇÃO
  // ============================================================
  document.addEventListener('DOMContentLoaded', function () {
    M.AutoInit();
    M.FloatingActionButton.init(document.querySelectorAll('.fixed-action-btn'), { hoverEnabled: true });
    ['modalConfirmacao'].forEach(id => {
      const el = document.getElementById(id);
      if (el) M.Modal.init(el, { dismissible: false });
    });
    formSessoes_carregar();
  });

  // ============================================================
  // CARREGAMENTO E RENDERIZAÇÃO DA LISTA DE SESSÕES
  // ============================================================

  function formSessoes_carregar() {
    // Garante que o painel esteja de volta ao body antes de re-renderizar
    formSessoes_fecharFichas();

    const loader = document.getElementById('loaderLista');
    const container = document.getElementById('listaSessoes');
    loader.style.display = 'block';
    container.style.opacity = '0.4';

    google.script.run
      .withSuccessHandler(function (res) {
        loader.style.display = 'none';
        container.style.opacity = '1';
        if (res.sucesso) {
          baseSessoes = res.sessoes || [];
          baseMembros = res.membros || {};
          baseLocais  = res.locais  || {};
          formSessoes_renderizar(baseSessoes);
        } else {
          M.toast({ html: 'Erro ao carregar: ' + res.erro, classes: 'red darken-2' });
        }
      })
      .withFailureHandler(function () {
        loader.style.display = 'none';
        container.style.opacity = '1';
        M.toast({ html: 'Falha crítica no servidor.', classes: 'red darken-2' });
      })
      .formSessoes_buscarDadosCompletos();
  }

  function formSessoes_renderizar(lista) {
    const container = document.getElementById('listaSessoes');
    container.innerHTML = '';

    if (!lista || lista.length === 0) {
      container.innerHTML = `
        <div class="lista-vazia-msg">
          <i class="material-icons">event_busy</i>
          <p>Nenhuma sessão encontrada para esta busca.</p>
        </div>`;
      return;
    }

    lista.forEach(s => {
      const partes = s.datasessao && s.datasessao !== 'Data não informada'
        ? s.datasessao.split('/') : null;
      const dia = partes ? partes[0] : '--';
      const mes = partes ? (MESES_PT[parseInt(partes[1], 10) - 1] || '') : '';
      const ano = partes ? partes[2] : '';
      const idSafe = _esc(s.id);

      const card = document.createElement('div');
      card.className = 'collection-item-sessao';
      card.setAttribute('data-sessao-id', s.id); // âncora para o painel de expansão

      // Conteúdo normal do card dentro de .sess-card-top
      card.innerHTML = `
        <div class="sess-card-top">
          <div class="sess-col-data">
            <span class="sess-data-dia">${dia}</span>
            <span class="sess-data-mes">${mes}</span>
            <span class="sess-data-ano">${ano}</span>
          </div>
          <div class="sess-col-info">
            <span class="sess-orgao">${s.orgao || 'Órgão não informado'}</span>
            <span class="sess-local">
              <i class="material-icons" style="font-size:13px; vertical-align:middle; margin-right:3px;">location_on</i>
              ${s.local || 'Local não informado'}
            </span>
            <span class="sess-participantes sess-presidente" style="display: block; margin-top: 2px;">
              <strong>Presidente: </strong>${s.presidente || 'Não informado'}
            </span>
            <span class="sess-participantes sess-secretario" style="display: block; margin-top: 2px;">
              <strong>Secretário: </strong>${s.secretario || 'Não informado'}
            </span>
          </div>
          <div class="sess-col-metricas">
            <span class="sess-metrica-num">${s.totalFichas}</span>
            <span class="sess-metrica-label">Processo${s.totalFichas !== 1 ? 's' : ''}<br>pautado${s.totalFichas !== 1 ? 's' : ''}</span>
          </div>
          <div class="sess-col-actions">
            <i class="material-icons act-btn c-pauta tooltipped" data-tooltip="Criar Pauta" onclick="formSessoes_gerarPauta('${idSafe}')">assignment</i>
            <i class="material-icons act-btn c-ata tooltipped" data-tooltip="Criar Ata (em breve)" onclick="formSessoes_emBreve('Criar Ata')">description</i>
            <i class="material-icons act-btn c-magic tooltipped" data-tooltip="Pincel Mágico" onclick="formSessoes_abrirPincelMagico('${idSafe}', '${_esc(s.orgao)}')">auto_fix_high</i>
            <i class="material-icons act-btn c-fichas tooltipped" data-tooltip="Fichas de Votação" onclick="formSessoes_abrirFichas('${idSafe}')">ballot</i>
            <i class="material-icons act-btn c-edit tooltipped" data-tooltip="Editar Sessão" onclick="formSessoes_abrirEditar('${idSafe}')">edit</i>
            <i class="material-icons act-btn c-del tooltipped" data-tooltip="Excluir Sessão" onclick="formSessoes_confirmarExclusao('${idSafe}', '${_esc(s.datasessao)}')">delete</i>
          </div>
        </div>
      `;

      container.appendChild(card);
    });

    M.Tooltip.init(document.querySelectorAll('.tooltipped'));
  }

  // ============================================================
  // FILTRO
  // ============================================================

  function formSessoes_filtrar() {
    const termo = (document.getElementById('inputBuscaSessao').value || '').toLowerCase().trim();
    if (!termo) { formSessoes_renderizar(baseSessoes); return; }
    const filtrados = baseSessoes.filter(s =>
      (s.datasessao || '').toLowerCase().includes(termo) ||
      (s.orgao || '').toLowerCase().includes(termo) ||
      (s.local || '').toLowerCase().includes(termo) ||
      (s.presidente || '').toLowerCase().includes(termo) ||
      (s.secretario || '').toLowerCase().includes(termo)
    );
    formSessoes_renderizar(filtrados);
  }

  // ============================================================
  // MODAL DE CADASTRO / EDIÇÃO DE SESSÃO
  // ============================================================

  function formSessoes_abrirNova() {
    document.getElementById('sessaoForm').reset();
    document.getElementById('sess_f_Id').value = '';
    document.getElementById('sessaoModalTitulo').innerText = 'Nova Sessão';
    sessaoDataISO = '';
    _initDatepickerSessao('');
    M.FormSelect.init(document.querySelectorAll('#modalSessaoCad select'));
    _autocompleteMembrosSessao();
    M.updateTextFields();
    _abrirModal('modalSessaoCad');
  }

  function formSessoes_abrirEditar(id) {
    const s = baseSessoes.find(x => x.id === id);
    if (!s) return M.toast({ html: 'Sessão não encontrada.', classes: 'orange darken-3' });

    document.getElementById('sessaoForm').reset();
    document.getElementById('sessaoModalTitulo').innerText = 'Editar Sessão';
    document.getElementById('sess_f_Id').value = s.id;
    document.getElementById('sess_f_Local').value = s.local || '';
    document.getElementById('sess_f_Presidente').value = s.presidente || '';
    document.getElementById('sess_f_Secretario').value = s.secretario || '';
    sessaoDataISO = s.dataiso || '';
    _initDatepickerSessao(s.datasessao || '');

    setTimeout(() => {
      const sel = document.getElementById('sess_f_Orgao');
      sel.value = s.orgao || '';
      M.FormSelect.init(sel);
    }, 80);

    _autocompleteMembrosSessao();
    M.updateTextFields();
    _abrirModal('modalSessaoCad');
  }

  function _initDatepickerSessao(valorExibido) {
    const el = document.getElementById('sess_f_Data');
    if (!el) return;
    const instAnterior = M.Datepicker.getInstance(el);
    if (instAnterior) instAnterior.destroy();
    M.Datepicker.init(el, {
      format: 'dd/mm/yyyy', autoClose: true, i18n: _i18nPtBR(),
      onSelect: function (d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        sessaoDataISO = `${y}-${m}-${day}`;
      }
    });
    if (valorExibido) { el.value = valorExibido; M.updateTextFields(); }
  }

  function _initInlineAutocomplete(input, listaNomes) {
    if (!input) return;
    // Remove qualquer listener anterior
    input.removeEventListener('input', _handleInlineAutocomplete);
    input.addEventListener('input', (e) => _handleInlineAutocomplete(e, listaNomes));
  }

  function _autocompleteMembrosSessao() {
    const listaNomes = Object.keys(baseMembros);
    ['sess_f_Presidente', 'sess_f_Secretario'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const inst = M.Autocomplete.getInstance(el);
      if (inst) inst.destroy();
      M.Autocomplete.init(el, { data: baseMembros, minLength: 1, limit: 5 });
      el.addEventListener('input', (e) => _handleInlineAutocomplete(e, listaNomes));
    });
    const elLocal = document.getElementById('sess_f_Local');
    if (elLocal) M.Autocomplete.init(elLocal, { data: baseLocais, minLength: 0, limit: 5 });
  }

  function _handleInlineAutocomplete(e, lista) {
    const input = e.target;
    const valor = input.value;
    if (e.inputType === 'deleteContentBackward' || !valor) return;
    const sugestao = lista.find(nome => nome.toLowerCase().startsWith(valor.toLowerCase()));
    if (sugestao) {
      const posicaoCursor = input.selectionStart;
      input.value = sugestao;
      input.setSelectionRange(posicaoCursor, sugestao.length);
    }
  }

  function formSessoes_salvar() {
    const orgao = document.getElementById('sess_f_Orgao').value;
    if (!orgao) return M.toast({ html: 'Selecione o Órgão Deliberativo.', classes: 'orange darken-3' });
    if (!sessaoDataISO) return M.toast({ html: 'Selecione a Data da Sessão.', classes: 'orange darken-3' });

    const btn = document.getElementById('sessBtnSalvar');
    btn.disabled = true;
    btn.innerHTML = 'Processando...';

    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Sessão salva com sucesso!', classes: 'green darken-2' });
        btn.disabled = false;
        btn.innerHTML = '<i class="material-icons left">save</i>Salvar';
        M.Modal.getInstance(document.getElementById('modalSessaoCad')).close();
        formSessoes_carregar();
      })
      .withFailureHandler(function (err) {
        M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
        btn.disabled = false;
        btn.innerHTML = '<i class="material-icons left">save</i>Salvar';
      })
      .formSessoes_salvarRegistro({
        id: document.getElementById('sess_f_Id').value || '',
        datasessao: sessaoDataISO,
        orgao: orgao,
        local: document.getElementById('sess_f_Local').value,
        presidente: document.getElementById('sess_f_Presidente').value,
        secretario: document.getElementById('sess_f_Secretario').value
      });
  }

  // ============================================================
  // EXCLUSÃO DE SESSÃO
  // ============================================================

  function formSessoes_confirmarExclusao(id, data) {
    document.getElementById('iconConfirmacao').innerText = 'delete_forever';
    document.getElementById('iconConfirmacao').className = 'material-icons large red-text text-darken-2';
    document.getElementById('tituloConfirmacao').innerText = 'Confirmar exclusão';
    document.getElementById('msgConfirmacao').innerText =
      `A sessão de ${data} será removida permanentemente.\n\nAs fichas (pauta) sem votos também serão excluídas.\nEsta ação não pode ser desfeita.`;

    const btnConf = document.getElementById('btnConfirmarAcao');
    const novoBtn = btnConf.cloneNode(true);
    novoBtn.innerHTML = 'Excluir Sessão';
    btnConf.parentNode.replaceChild(novoBtn, btnConf);

    novoBtn.onclick = function () {
      novoBtn.disabled = true;
      novoBtn.innerHTML = 'Processando...';
      google.script.run
        .withSuccessHandler(function () {
          M.toast({ html: 'Sessão excluída com sucesso.', classes: 'blue-grey darken-2' });
          M.Modal.getInstance(document.getElementById('modalConfirmacao')).close();
          formSessoes_carregar();
        })
        .withFailureHandler(function (err) {
          novoBtn.disabled = false;
          novoBtn.innerHTML = 'Excluir Sessão';
          if (err.message.includes("BLOQUEIO")) {
            M.toast({ html: err.message.replace("Error: ", ""), classes: 'orange darken-4', displayLength: 6000 });
            M.Modal.getInstance(document.getElementById('modalConfirmacao')).close();
          } else {
            M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
          }
        })
        .formSessoes_excluirRegistro(id);
    };
    _abrirModal('modalConfirmacao');
  }

  // ============================================================
  // EXPANSÃO INLINE DO CARD — FICHAS DE VOTAÇÃO
  // ============================================================

  /**
   * Abre o painel de fichas expandindo o card da sessão.
   * Clicar no mesmo card fechado → expande. Clicar no expandido → fecha.
   */
  function formSessoes_abrirFichas(idSessao) {
    const panel = document.getElementById('sessExpansionPanel');
    const novoCard = document.querySelector(`.collection-item-sessao[data-sessao-id="${idSessao}"]`);
    const cardAtivo = document.querySelector('.collection-item-sessao.expandido');
    const listWrapper = document.querySelector('.list-wrapper');

    // Toggle: clicar no mesmo card fecha
    if (cardAtivo === novoCard) {
      formSessoes_fecharFichas();
      return;
    }

    // Fecha o card anteriormente expandido sem recarregar a lista
    if (cardAtivo) {
      cardAtivo.classList.remove('expandido');
      cardAtivo.style.height = '';
    }

    // Configura o estado global
    sessaoAtualId = idSessao;
    fichaAtualId = '';
    fichaAtualIdProc = '';
    pdfSelecionado = null;
    fichasDaSessao = [];

    // Reseta a área de fichas e votos
    _fichasPainelVazio();
    formSessoes_fecharNovoVoto();
    document.getElementById('fichasListaProcessos').innerHTML = `
      <div class="center-align" style="padding: 30px;">
        <div class="preloader-wrapper small active">
          <div class="spinner-layer spinner-blue-only">
            <div class="circle-clipper left"><div class="circle"></div></div>
            <div class="gap-patch"><div class="circle"></div></div>
            <div class="circle-clipper right"><div class="circle"></div></div>
          </div>
        </div>
      </div>`;

    // Move o painel para dentro do card e expande
    novoCard.classList.add('expandido');
    novoCard.appendChild(panel);
    panel.style.display = 'flex';
    panel.style.flexDirection = 'column';

    // Troca o ícone de fichas por 'close' para fechar o card
    const iconeFichas = novoCard.querySelector('.c-fichas');
    if (iconeFichas) {
      iconeFichas.textContent = 'close';
      iconeFichas.title = 'Recolher';
      iconeFichas.style.color = 'rgba(255,255,255,0.75)';
    }

    // Esconde o FAB e bloqueia scroll
    document.body.classList.add('fichas-abertas');
    document.body.style.overflow = 'hidden';

    // Oculta a barra de pesquisa e rola para o topo imediatamente (sem animação)
    const searchHeader = document.querySelector('.search-header-container');
    if (searchHeader) searchHeader.style.display = 'none';
    window.scrollTo({ top: 0 });

    // Mede a posição real do card APÓS scroll e header oculto,
    // para que a altura cubra exatamente o espaço restante da janela
    requestAnimationFrame(() => {
      const cardTop = novoCard.getBoundingClientRect().top;
      const margemInferior = 20; // respiro na borda inferior
      const alturaDisponivel = window.innerHeight - cardTop - margemInferior;
      novoCard.style.height = Math.max(alturaDisponivel, 300) + 'px';
    });

    // Bloqueia o scroll da lista externa (garantia extra)
    if (listWrapper) listWrapper.classList.add('scroll-bloqueado');

    // Carrega a lista de fichas do servidor
    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.sucesso) {
          document.getElementById('fichasListaProcessos').innerHTML =
            `<div style="padding:20px; color:#c62828; font-size:0.85rem;">${res.erro}</div>`;
          return;
        }
        fichasDaSessao = res.fichas || [];
        _renderizarListaFichas(fichasDaSessao);
      })
      .withFailureHandler(function (err) {
        document.getElementById('fichasListaProcessos').innerHTML =
          `<div style="padding:20px; color:#c62828; font-size:0.85rem;">Erro: ${err.message}</div>`;
      })
      .formSessoes_buscarFichas(idSessao);
  }

  /**
   * Fecha o painel de fichas: remove a classe do card e devolve o painel ao body.
   */
  function formSessoes_fecharFichas() {
    const card = document.querySelector('.collection-item-sessao.expandido');
    if (!card) return;

    // Restaura o ícone de fichas
    const iconeFichas = card.querySelector('.c-fichas');
    if (iconeFichas) {
      iconeFichas.textContent = 'ballot';
      iconeFichas.title = 'Fichas de Votação';
      iconeFichas.style.color = '';
    }

    card.classList.remove('expandido');
    card.style.height = '';

    const panel = document.getElementById('sessExpansionPanel');
    document.body.appendChild(panel);
    panel.style.display = 'none';

    // Restaura a barra de pesquisa
    const searchHeader = document.querySelector('.search-header-container');
    if (searchHeader) searchHeader.style.display = '';

    // Libera o scroll e restaura o FAB
    const listWrapper = document.querySelector('.list-wrapper');
    if (listWrapper) listWrapper.classList.remove('scroll-bloqueado');
    document.body.classList.remove('fichas-abertas');
    document.body.style.overflow = '';

    // Limpa estados
    fichaAtualId = '';
    fichaAtualIdProc = '';
    fichasDaSessao = [];
    sessaoAtualId = '';
    fichaSelecionadaOriginal = null;
    _fichasPainelVazio();
    formSessoes_fecharNovoVoto();
  }

  // ============================================================
  // LISTA DE FICHAS
  // ============================================================

  function _renderizarListaFichas(fichas) {
    const container = document.getElementById('fichasListaProcessos');
    document.getElementById('fichasContagem').textContent = fichas.length;

    if (!fichas || fichas.length === 0) {
      container.innerHTML = `
        <div style="padding:30px; text-align:center; color:#bbb; font-size:0.85rem;">
          <i class="material-icons" style="font-size:36px; display:block; margin-bottom:8px; color:#ddd;">gavel</i>
          Nenhum processo pautado nesta sessão.
        </div>`;
      return;
    }

    fichas.sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
    container.innerHTML = '';

    fichas.forEach(f => {
      const item = document.createElement('div');
      item.className = 'ficha-proc-item';
      item.setAttribute('data-ficha-id', f.id);
      item.setAttribute('data-ordem', f.ordem || 0);

      const reqShort = (f.proc.requerente || '').substring(0, 55);
      const statusCfg = _statusCor(f.proc.status);

      item.innerHTML = `
        <span class="ficha-proc-num">
          <span style="color: #a68945; font-weight: bold; margin-right: 4px;">#${f.ordem}</span>
          ${f.proc.numero || 'S/N'}
        </span>
        <span class="ficha-proc-req-short" title="${_esc(f.proc.requerente)}">${reqShort || 'Requerente não informado'}</span>
        ${f.proc.status ? `<span class="ficha-proc-status-mini ${statusCfg}">${f.proc.status}</span>` : ''}
        <i class="material-icons delete-ficha-icon"
          onclick="event.stopPropagation(); formSessoes_confirmarExclusaoFicha('${f.id}', '${_esc(f.proc.numero)}')"
          title="Excluir ficha">delete</i>
      `;

      item.onclick = function () {
        document.querySelectorAll('.ficha-proc-item').forEach(el => el.classList.remove('selecionado'));
        this.classList.add('selecionado');
        _carregarPainelFicha(f);
      };

      container.appendChild(item);
    });

    if (sortableInstance) sortableInstance.destroy();
    sortableInstance = new Sortable(container, {
      animation: 150,
      handle: '.ficha-proc-item',
      draggable: '.ficha-proc-item',
      onEnd: function () {
        const novaOrdemIds = Array.from(container.children).map(c => c.getAttribute('data-ficha-id'));
        formSessoes_salvarNovaOrdemFichas(sessaoAtualId, novaOrdemIds);
      }
    });
  }

  function _carregarPainelFicha(ficha) {
    fichaAtualId     = ficha.id;
    fichaAtualIdProc = ficha.idprocesso;
    pdfSelecionado   = null;
    fichaSelecionadaOriginal = JSON.parse(JSON.stringify(ficha));

    document.getElementById('ficha_f_Id').value          = ficha.id;
    document.getElementById('ficha_f_IdProcesso').value  = ficha.idprocesso;
    document.getElementById('ficha_f_Relator').value     = ficha.relator || '';
    document.getElementById('ficha_f_Expediente').value  = ficha.expediente || '';

    _initInlineAutocomplete(document.getElementById('ficha_f_Relator'), Object.keys(baseMembros));

    M.updateTextFields();
    M.textareaAutoResize(document.getElementById('ficha_f_Expediente'));

    formSessoes_fecharNovoVoto();
    _fichasExibirConteudo();
    _carregarVotos(ficha.id);
    // Carrega participantes e procuradores
    participantesAtuais = (ficha.membros || '').split(';').map(s => s.trim()).filter(s => s);
    //procuradoresAtuais = (ficha.procuradores || '').split(';').map(s => s.trim()).filter(s => s);
    _renderizarParticipantes();
    //_renderizarProcuradores();
  }

  function _fichasPainelVazio() {
    document.getElementById('fichasVazio').style.display    = 'flex';
    document.getElementById('fichasConteudo').style.display = 'none';
  }

  function _fichasExibirConteudo() {
    document.getElementById('fichasVazio').style.display    = 'none';
    document.getElementById('fichasConteudo').style.display = 'flex';
  }

  // ============================================================
  // REORDENAÇÃO DE FICHAS
  // ============================================================

  function formSessoes_salvarNovaOrdemFichas(idSessao, novaOrdemIds) {
    if (!idSessao || !novaOrdemIds.length) return;
    M.toast({ html: 'Atualizando ordem...', classes: 'blue' });
    google.script.run
      .withSuccessHandler(function (res) {
        if (res.sucesso) {
          M.toast({ html: 'Ordem atualizada!', classes: 'green' });
          if (res.fichas) {
            fichasDaSessao = res.fichas;
            _renderizarListaFichas(fichasDaSessao);
            if (fichaAtualId) {
              setTimeout(() => {
                const item = document.querySelector(`.ficha-proc-item[data-ficha-id="${fichaAtualId}"]`);
                if (item) {
                  item.classList.add('selecionado');
                  const fichaAtualizada = fichasDaSessao.find(f => f.id === fichaAtualId);
                  if (fichaAtualizada) fichaSelecionadaOriginal = JSON.parse(JSON.stringify(fichaAtualizada));
                }
              }, 200);
            }
          }
        } else {
          M.toast({ html: 'Erro: ' + res.erro, classes: 'red' });
        }
      })
      .withFailureHandler(err => M.toast({ html: 'Erro: ' + err.message, classes: 'red' }))
      .formSessoes_atualizarOrdemLote(idSessao, novaOrdemIds);
  }

  function formSessoes_confirmarExclusaoFicha(idFicha, numeroProcesso) {
    document.getElementById('iconConfirmacao').innerHTML = 'delete_forever';
    document.getElementById('iconConfirmacao').className = 'material-icons large red-text text-darken-2';
    document.getElementById('tituloConfirmacao').innerText = 'Excluir ficha';
    document.getElementById('msgConfirmacao').innerText =
      `Deseja realmente excluir a ficha do processo ${numeroProcesso}?\n\n` +
      `Se houver votos vinculados, a exclusão será bloqueada.`;

    const btnConf = document.getElementById('btnConfirmarAcao');
    const novoBtn = btnConf.cloneNode(true);
    novoBtn.innerHTML = 'Excluir Ficha';
    btnConf.parentNode.replaceChild(novoBtn, btnConf);

    novoBtn.onclick = function () {
      novoBtn.disabled = true;
      novoBtn.innerHTML = 'Processando...';
      google.script.run
        .withSuccessHandler(function () {
          M.toast({ html: 'Ficha excluída com sucesso.', classes: 'green darken-2' });
          M.Modal.getInstance(document.getElementById('modalConfirmacao')).close();
          formSessoes_abrirFichas(sessaoAtualId); // recarrega as fichas
        })
        .withFailureHandler(function (err) {
          novoBtn.disabled = false;
          novoBtn.innerHTML = 'Excluir Ficha';
          if (err.message.includes('BLOQUEIO')) {
            M.toast({ html: err.message.replace("Error: ", ""), classes: 'orange darken-4', displayLength: 6000 });
            M.Modal.getInstance(document.getElementById('modalConfirmacao')).close();
          } else {
            M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
          }
        })
        .formSessoes_excluirFicha(idFicha);
    };
    _abrirModal('modalConfirmacao');

  function formSessoes_salvarFicha() {
    const id = document.getElementById('ficha_f_Id').value;
    if (!id || !fichaSelecionadaOriginal) return M.toast({ html: 'Nenhuma ficha selecionada.', classes: 'orange darken-3' });

    M.toast({ html: 'Salvando alterações...', classes: 'blue' });

      relator: document.getElementById('ficha_f_Relator').value,
      expediente: document.getElementById('ficha_f_Expediente').value,
      membros: participantesAtuais.join('; '),
      //procuradores: procuradoresAtuais.join('; ')
    };

    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Ficha salva com sucesso!', classes: 'green' });
        if (fichaSelecionadaOriginal) {
          fichaSelecionadaOriginal.relator    = dados.relator;
          fichaSelecionadaOriginal.expediente = dados.expediente;
          fichaSelecionadaOriginal.membros    = dados.membros;
          //fichaSelecionadaOriginal.procuradores = dados.procuradores;

        const idx = fichasDaSessao.findIndex(f => f.id === id);

          fichasDaSessao[idx].relator    = dados.relator;
          fichasDaSessao[idx].expediente = dados.expediente;
          fichasDaSessao[idx].membros    = dados.membros;
          //fichasDaSessao[idx].procuradores = dados.procuradores;
        }
      })
      .withFailureHandler(err => M.toast({ html: 'Erro ao salvar: ' + err.message, classes: 'red' }))
      .formSessoes_salvarFicha(dados);

    const container = document.getElementById('fichasListaVotos');
    if (!container) return;
    container.innerHTML = `
      <div class="votos-vazio">
        <div class="preloader-wrapper small active">
          <div class="spinner-layer spinner-blue-only">
            <div class="circle-clipper left"><div class="circle"></div></div>
            <div class="gap-patch"><div class="circle"></div></div>
            <div class="circle-clipper right"><div class="circle"></div></div>
          </div>
        </div>
      </div>`;

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res.sucesso) {
          container.innerHTML = `<div class="votos-vazio">Erro: ${res.erro || 'desconhecido'}</div>`;
          return;
        }
        _renderizarVotos(res.votos || []);

        container.innerHTML = `<div class="votos-vazio">Falha na comunicação.</div>`;

  function _renderizarVotos(votos) {
    const container = document.getElementById('fichasListaVotos');
    if (!container) return;

    const totalSpan = document.getElementById('fichaVotosTotal');
    if (totalSpan) totalSpan.textContent = `${votos.length} voto${votos.length !== 1 ? 's' : ''}`;

    if (!votos || votos.length === 0) {
      container.innerHTML = `
        <div class="votos-vazio">
          <i class="material-icons" style="font-size:32px; display:block; margin-bottom:8px; color:#ddd;">how_to_vote</i>
          Nenhum voto registrado. Use o botão + para adicionar.
        </div>`;
      return;
    }

    container.innerHTML = '';
    const tipoOpcoes = ['Voto do relator', 'Voto divergente'];

    votos.forEach(v => {
      const tipoClass = _votoTipoClasse(v.tipovoto);
      const idSafe    = _esc(v.id);
      const linkRel   = v.urlvoto || '';
      const resultadoExibe = (v.resultado !== '' && v.resultado !== null && v.resultado !== undefined) ? v.resultado : '—';

      const secaoRelatorio = linkRel
        ? `<div class="voto-campo-grupo" style="margin-top: 4px;">
            <label class="voto-campo-label">Relatório</label>
            <div class="voto-pdf-container">
              <a href="${_esc(linkRel)}" target="_blank" class="voto-pdf-link">
                <i class="material-icons">picture_as_pdf</i>Abrir relatório
              </a>
              <button class="btn-pdf-excluir tooltipped" data-tooltip="Excluir arquivo"
                onclick="formSessoes_removerRelatorio('${idSafe}', '${_esc(linkRel)}')">
                <i class="material-icons" style="font-size:16px;">delete</i>
              </button>
            </div>
           </div>`
        : `<div class="voto-campo-grupo" style="margin-top: 4px;">
            <label class="voto-campo-label">Relatório</label>
            <button class="btn-pdf-adicionar" onclick="formSessoes_adicionarRelatorioDireto('${idSafe}')">
              <i class="material-icons" style="font-size:16px;">add_circle_outline</i>Anexar PDF
            </button>
           </div>`;

      const opsTipo = tipoOpcoes.map(o =>
        `<option value="${o}" ${v.tipovoto === o ? 'selected' : ''}>${o}</option>`).join('');

      const acc = document.createElement('div');
      acc.className = 'voto-accordion';
      acc.setAttribute('data-voto-id', v.id);

      acc.innerHTML = `
        <div class="voto-accordion-header" onclick="formSessoes_toggleVoto(this)">
          <span class="voto-tipo-chip ${tipoClass}">${_escTexto(v.tipovoto) || '—'}</span>
          <div class="voto-header-info">
            <span class="voto-header-votante">${_escTexto(v.relator) || 'Relator não informado'}</span>
          </div>
          <span class="voto-resultado-placar" title="Resultado">${_escTexto(resultadoExibe)}</span>
          <i class="material-icons voto-chevron">expand_more</i>
        </div>

        <div class="voto-accordion-body">
          <div class="voto-campo-grupo">
            <label class="voto-campo-label">TipoVoto</label>
            <div class="input-field voto-campo-input">
              <select id="ve_TipoVoto_${idSafe}">${opsTipo}</select>
            </div>
          </div>
          <div class="voto-campo-grupo">
            <label class="voto-campo-label">Relator</label>
            <div class="input-field voto-campo-input">
              <input id="ve_Relator_${idSafe}" type="text" value="${_escTexto(v.relator)}" class="autocomplete">
            </div>
          </div>
          <div class="voto-campo-grupo voto-campo-grupo-voto">
            <label class="voto-campo-label" style="margin-top: 10px;">Voto</label>
            <div class="input-field voto-campo-input">
              <textarea id="ve_Voto_${idSafe}" class="materialize-textarea voto-textarea">${_escTexto(v.voto)}</textarea>
            </div>
          </div>
          <div class="voto-campo-grupo">
            <label class="voto-campo-label">Resultado</label>

  function formSessoes_toggleVoto(header) {
    const acc = header.closest('.voto-accordion');
    const estaAberto = acc.classList.contains('aberto');
    document.querySelectorAll('.voto-accordion.aberto').forEach(el => el.classList.remove('aberto'));
    if (!estaAberto) acc.classList.add('aberto');
  }

  function formSessoes_salvarVotoEdicao(id) {
    const selTipo    = document.getElementById(`ve_TipoVoto_${id}`);
    const inpRelator = document.getElementById(`ve_Relator_${id}`);
    const taVoto     = document.getElementById(`ve_Voto_${id}`);

    if (!selTipo || !inpRelator || !taVoto)
      return M.toast({ html: 'Campos do voto não encontrados.', classes: 'orange darken-3' });

    const tipovoto = selTipo.value;
    if (!tipovoto)
      return M.toast({ html: 'TipoVoto é obrigatório.', classes: 'orange darken-3' });

    const acc    = document.querySelector(`.voto-accordion[data-voto-id="${id}"]`);
    const urlvoto = acc && acc.querySelector('.voto-pdf-link')
      ? acc.querySelector('.voto-pdf-link').href : '';

    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Voto atualizado!', classes: 'green darken-2' });
        _carregarVotos(fichaAtualId);
      })
      .withFailureHandler(function (err) {
        M.toast({ html: 'Erro ao salvar: ' + err.message, classes: 'red darken-2' });
      })
      .formSessoes_salvarVoto({
        id, idfichavotacao: fichaAtualId, idprocesso: fichaAtualIdProc,
        tipovoto, relator: inpRelator.value, voto: taVoto.value.trim(),
        resultado: '', urlvoto
      });
  }

  function formSessoes_salvarVoto() {
    if (!fichaAtualId) return M.toast({ html: 'Selecione uma ficha primeiro.', classes: 'orange darken-3' });

    const tipo = document.getElementById('voto_f_Tipo').value;
    const voto = document.getElementById('voto_f_Voto').value.trim();
    if (!tipo) return M.toast({ html: 'TipoVoto é obrigatório.', classes: 'orange darken-3' });

    const obj = {
      id:             document.getElementById('voto_f_Id').value || '',
      idfichavotacao: fichaAtualId,
      idprocesso:     fichaAtualIdProc,
      tipovoto:       tipo,
      relator:        document.getElementById('voto_f_Relator').value,
      voto:           voto,
      resultado:      document.getElementById('voto_f_Resultado').value,
      urlvoto:        ''
    };

    M.toast({ html: 'Salvando voto...', classes: 'blue darken-2' });

    google.script.run
      .withSuccessHandler(function (res) {
        if (pdfSelecionado && pdfSelecionado.base64) {
          // --- Dados robustos para o upload ---
          const numeroProcesso = (fichaSelecionadaOriginal?.proc?.numero) ||
                                (fichasDaSessao.find(f => f.id === fichaAtualId)?.proc?.numero) ||
                                'sem_numero';
          const nomeRelator = document.getElementById('voto_f_Relator').value || 'sem_relator';
          const sessao = baseSessoes.find(s => s.id === sessaoAtualId);
          const dataSessaoStr = sessao?.datasessao || '';   // formato "dd/MM/yyyy"
          const orgao = sessao?.orgao || '';

          M.toast({ html: 'Enviando PDF para o Drive...', classes: 'blue darken-2' });
          google.script.run
            .withSuccessHandler(function () {
              M.toast({ html: 'Voto e PDF salvos!', classes: 'green darken-2' });
              formSessoes_fecharNovoVoto();
              _carregarVotos(fichaAtualId);
            })
            .withFailureHandler(function (err) {
              M.toast({ html: 'Voto salvo, erro no PDF: ' + err.message, classes: 'orange darken-3' });
              formSessoes_fecharNovoVoto();
              _carregarVotos(fichaAtualId);
            })
            .formSessoes_uploadRelatorio(res.id, pdfSelecionado.base64, pdfSelecionado.nome, numeroProcesso, nomeRelator, dataSessaoStr, orgao);
        } else {
          M.toast({ html: 'Voto salvo!', classes: 'green darken-2' });
          formSessoes_fecharNovoVoto();
          _carregarVotos(fichaAtualId);
        }
      })
      .formSessoes_salvarVoto(obj);
  }

  function formSessoes_excluirVoto(idVoto) {
    if (!confirm('Remover este voto permanentemente?')) return;
    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Voto removido.', classes: 'blue-grey darken-2' });
        _carregarVotos(fichaAtualId);
      })
      .withFailureHandler(function (err) {
        M.toast({ html: 'Erro: ' + err.message, classes: 'red darken-2' });
      })
      .formSessoes_excluirVoto(idVoto);
  }

  // ============================================================
  // UPLOAD DE PDF

  function formSessoes_selecionarPDF(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.type !== 'application/pdf') return M.toast({ html: 'Selecione um PDF válido.', classes: 'red darken-2' });
    if (file.size > 15 * 1024 * 1024) return M.toast({ html: 'Arquivo muito grande. Limite: 15 MB.', classes: 'red darken-2' });

    const reader = new FileReader();
    reader.onload = function (e) {
      pdfSelecionado = { base64: e.target.result.split(',')[1], nome: file.name };
      const uploadArea = document.getElementById('uploadAreaVoto');
      uploadArea.className = 'upload-area selecionado';
      uploadArea.innerHTML = `
        <i class="material-icons">check_circle</i>
        <p><strong>${file.name}</strong><br>${(file.size / 1024).toFixed(0)} KB selecionado</p>`;
      M.toast({ html: 'PDF pronto para envio.', classes: 'blue darken-2' });
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  function formSessoes_adicionarRelatorioDireto(idVoto) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/pdf';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 15 * 1024 * 1024) return M.toast({ html: 'Limite de 15MB excedido', classes: 'red' });
      M.toast({ html: 'Fazendo upload...', classes: 'blue' });

      const reader = new FileReader();
      reader.onload = function (evt) {
        // Coleta dados adicionais da ficha atual
        const numeroProcesso = fichaSelecionadaOriginal?.proc?.numero || 'sem_numero';
        const nomeRelator = fichaSelecionadaOriginal?.relator || 'sem_relator';
        const sessao = baseSessoes.find(s => s.id === sessaoAtualId);
        const dataSessaoISO = sessao?.dataiso || '';
        const orgao = sessao?.orgao || '';

        google.script.run
          .withSuccessHandler(function () {
            M.toast({ html: 'Relatório anexado!', classes: 'green' });
            _carregarVotos(fichaAtualId);
          })
          .withFailureHandler(err => M.toast({ html: err.message, classes: 'red' }))
          .formSessoes_uploadRelatorio(
            idVoto,
            evt.target.result.split(',')[1],
            file.name,
            (fichaSelecionadaOriginal?.proc?.numero) || (fichasDaSessao.find(f => f.id === fichaAtualId)?.proc?.numero) || 'sem_numero',
            fichaSelecionadaOriginal?.relator || 'sem_relator',
            (baseSessoes.find(s => s.id === sessaoAtualId)?.datasessao) || '',
            (baseSessoes.find(s => s.id === sessaoAtualId)?.orgao) || ''
          );
      };  // Fecha corretamente o reader.onload

      reader.readAsDataURL(file); // AGORA FORA DO ONLOAD
    };
    input.click();
  }

  function formSessoes_removerRelatorio(idVoto, urlArquivo) {
    if (!confirm('Deseja realmente excluir este arquivo PDF permanentemente do Drive?')) return;
    M.toast({ html: 'Excluindo arquivo...', classes: 'amber darken-3' });
    google.script.run
      .withSuccessHandler(function () {
        M.toast({ html: 'Arquivo removido.', classes: 'blue-grey' });
        _carregarVotos(fichaAtualId);
      })
      .withFailureHandler(err => M.toast({ html: err.message, classes: 'red' }))
      .formSessoes_excluirRelatorio(idVoto, urlArquivo);
  }

  function formSessoes_mostrarCampoAdicionar(tipo) {
    const campoId = tipo === 'membro' ? 'campoAdicionarMembro' : 'campoAdicionarProcurador';
    const campo = document.getElementById(campoId);
    campo.style.display = campo.style.display === 'none' ? 'block' : 'none';
    if (campo.style.display === 'block') {
      const inputId = tipo === 'membro' ? 'novoMembroInput' : 'novoProcuradorInput';
      const input = document.getElementById(inputId);
      // Inicializa autocomplete com a lista de membros (baseMembros)
      _initInlineAutocomplete(input, Object.keys(baseMembros));
      input.focus();
    }
  }

  function formSessoes_adicionarParticipante(tipo) {
    const inputId = tipo === 'membro' ? 'novoMembroInput' : 'novoProcuradorInput';
    const nome = document.getElementById(inputId).value.trim();
    if (!nome) return;

    if (tipo === 'membro') {
      if (!participantesAtuais.includes(nome)) {
        participantesAtuais.push(nome);
        _renderizarParticipantes();
      }
    } else {
      if (!procuradoresAtuais.includes(nome)) {
        procuradoresAtuais.push(nome);
        _renderizarProcuradores();
      }
    }

    formSessoes_salvarFicha();

    document.getElementById(inputId).value = '';
    const campoId = tipo === 'membro' ? 'campoAdicionarMembro' : 'campoAdicionarProcurador';
    document.getElementById(campoId).style.display = 'none';
  }

  function formSessoes_removerParticipante(tipo, nome) {
    if (tipo === 'membro') {
      participantesAtuais = participantesAtuais.filter(n => n !== nome);
      _renderizarParticipantes();
    } else {
      procuradoresAtuais = procuradoresAtuais.filter(n => n !== nome);
      _renderizarProcuradores();
    }

    formSessoes_salvarFicha();
  }

  function formSessoes_executarPincelMagico() {
    const idSessao = document.getElementById('pm_idSessao').value;
    const orgao    = document.getElementById('pm_orgaoSessao').value;
    const texto    = document.getElementById('pm_textoBruto').value;
    if (!texto.trim()) return M.toast({ html: 'Cole algum texto primeiro.', classes: 'orange' });

    const processosUnicos = [...new Set((texto.match(/(20\d{7})/g) || []))];
    if (!processosUnicos.length) return M.toast({ html: 'Nenhum processo válido identificado.', classes: 'red' });

    const btn = event.target.closest('button');
    btn.disabled = true;
    const originalHtml = btn.innerHTML;
    btn.innerHTML = 'Processando...';

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false; btn.innerHTML = originalHtml;
        if (res.sucesso) {
          let msg = `${res.adicionados} fichas criadas.`;
          if (res.avisos) msg += ` (${res.avisos})`;
          M.toast({ html: msg, classes: res.adicionados > 0 ? 'green' : 'orange', displayLength: 5000 });
          if (res.adicionados > 0) {
            M.Modal.getInstance(document.getElementById('modalPincelMagico')).close();
            formSessoes_carregar();
          }
        } else {
          M.toast({ html: 'Erro: ' + res.erro, classes: 'red' });
        }
      })
      .formSessoes_importarProcessosEmMassa(idSessao, processosUnicos, orgao);
  }

  // ============================================================
  // FUNCIONALIDADES EM DESENVOLVIMENTO
  // ============================================================

  function formSessoes_emBreve(funcionalidade) {
    M.toast({
      html: `<i class="material-icons left" style="line-height:inherit">construction</i>${funcionalidade} em desenvolvimento...`,
      classes: 'amber darken-4'
    });
  }

  function formSessoes_gerarPauta(idSessao) {
    const sessao = baseSessoes.find(s => s.id === idSessao);
    if (!sessao) {
      M.toast({ html: 'Sessão não encontrada.', classes: 'red' });
      return;
    }

    // Se as fichas já estão em cache e correspondem à sessão, usa; senão, busca
    if (fichasDaSessao && fichasDaSessao.length > 0 && fichasDaSessao[0]?.idsessao === idSessao) {
      _exibirPauta(sessao, fichasDaSessao);
    } else {
      M.toast({ html: 'Carregando processos da sessão...', classes: 'blue' });
      google.script.run
        .withSuccessHandler(function (res) {
          if (res.sucesso) {
            fichasDaSessao = res.fichas;
            _exibirPauta(sessao, fichasDaSessao);
          } else {
            M.toast({ html: 'Erro ao carregar fichas: ' + res.erro, classes: 'red' });
          }
        })
        .withFailureHandler(err => M.toast({ html: 'Falha na comunicação: ' + err.message, classes: 'red' }))
        .formSessoes_buscarFichas(idSessao);
    }
  }

  function _exibirPauta(sessao, fichas) {
    const fichasOrdenadas = [...fichas].sort((a,b) => (a.ordem || 0) - (b.ordem || 0));

    // Procurador: prioriza o campo da sessão, senão usa o procurador do primeiro processo
    let procuradorExibido = sessao.procuradores || '';
    if (!procuradorExibido && fichasOrdenadas.length > 0) {
      procuradorExibido = fichasOrdenadas[0].proc?.procurador || 'Não informado';
    }

    // Formatação do órgão
    let orgao = sessao.orgao || 'Órgão Deliberativo';
    if (orgao === 'Órgão Deliberativo do SDP') orgao = 'Órgão Deliberativo';

    // Monta o texto
    let texto = `PAUTA DE JULGAMENTO - OAB/GO\n${orgao} - Sistema de Defesa das Prerrogativas\n\n`;
    texto += `Data: ${sessao.datasessao || 'Data não informada'}\n`;
    if (sessao.local) texto += `Local: ${sessao.local}\n`;
    texto += `=====================\n\n`;

    fichasOrdenadas.forEach((f, idx) => {
      const numero = f.proc.numero || 'S/N';
      const relator = f.relator || 'Não informado';
      texto += `${idx+1}º - Processo: ${numero}\n`;
      texto += `Procurador: ${procuradorExibido}\n`;
      texto += `Relator: ${relator}\n\n`;
    });

    texto += `=====================\n`;
    texto += `Total de processos: ${fichasOrdenadas.length}`;

    document.getElementById('pautaTexto').value = texto;
    _abrirModal('modalPauta');
  }

  function formSessoes_copiarPauta() {
    const textarea = document.getElementById('pautaTexto');
    textarea.select();
    textarea.setSelectionRange(0, 99999);
    document.execCommand('copy');
    M.toast({ html: 'Texto copiado para a área de transferência!', classes: 'green' });
  }

  // ============================================================
  // UTILITÁRIOS
  // ============================================================

  function _abrirModal(id) {
    const el = document.getElementById(id);
    const inst = M.Modal.getInstance(el) || M.Modal.init(el);
    inst.open();
  }

  function _esc(str) {
    return (str || '').toString()
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '&quot;');
  }

  function _escTexto(str) {
    return (str || '').toString()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function _i18nPtBR() {
    return {
      cancel: 'Cancelar', clear: 'Limpar', done: 'OK',
      months: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
      monthsShort: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
      weekdays: ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'],
      weekdaysShort: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
      weekdaysAbbrev: ['D','S','T','Q','Q','S','S']
    };
  }

  function _statusCor(status) {
    const mapa = {
      'Em tramitação': 's-tramitacao', 'Arquivado': 's-arquivado',
      'Deferido': 's-deferido',        'Indeferido': 's-indeferido',
      'Em recurso': 's-recurso',       'Em diligência': 's-diligencia',
      'Concluso': 's-concluso',        'Na secretaria': 's-secretaria'
    };
    return mapa[status] || 's-vazio';
  }

  function _votoTipoClasse(tipo) {
    const t = (tipo || '').toLowerCase();
    if (t.includes('relator'))  return 'voto-tipo-relator';
    if (t.includes('membro'))   return 'voto-tipo-membro';
    if (t.includes('minerva'))  return 'voto-tipo-minerva';
    if (t.includes('vogal'))    return 'voto-tipo-vogal';
    return 'voto-tipo-default';
  }

</script>
